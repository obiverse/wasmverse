<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letters on the Universal Machine</title>
<meta name="description" content="A Treatise on WebAssembly, from Transistors to Transcendence — in the manner of Euler's Letters to a German Princess">
<meta name="theme-color" content="#0a0a14">
<meta property="og:title" content="Letters on the Universal Machine">
<meta property="og:description" content="A Treatise on WebAssembly, from Transistors to Transcendence">
<meta property="og:type" content="article">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #06060e;
  --bg: #0a0a14;
  --bg-elevated: #0f0f1e;
  --bg-code: #0c0c18;
  --text: #ddd5c4;
  --text-dim: #9e9684;
  --text-bright: #f0e8d8;
  --gold: #c9a96e;
  --gold-bright: #e4c98a;
  --gold-dim: #8b6914;
  --gold-glow: rgba(201, 169, 110, 0.12);
  --sacred: rgba(201, 169, 110, 0.08);
  --border: #1e1e30;
  --border-subtle: #16162a;
  --accent-crimson: #8b3a3a;
  --sidebar-w: 300px;
  --content-max: 72ch;
  --font-body: 'Crimson Pro', 'Georgia', serif;
  --font-heading: 'Cormorant Garamond', 'Palatino', serif;
  --font-code: 'JetBrains Mono', 'Consolas', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: var(--gold-dim) var(--bg);
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }

body {
  font-family: var(--font-body);
  font-size: 19px;
  line-height: 1.85;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

::selection { background: var(--gold); color: var(--bg); }

/* ═══════════════════════════════════════════════
   TOP PROGRESS BAR — Always visible energy pulse
   ═══════════════════════════════════════════════ */
#top-progress {
  position: fixed;
  top: 0; left: 0;
  width: 0%;
  height: 3px;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright), var(--gold));
  z-index: 9999;
  transition: width 0.15s linear;
  box-shadow: 0 0 12px rgba(201, 169, 110, 0.5);
}

/* ═══════════════════════════════════════════════
   HERO — Cinematic gateway with particle field
   ═══════════════════════════════════════════════ */
#hero {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  z-index: 1000;
  background: var(--bg-deep);
  transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

#hero.exiting {
  opacity: 0;
  transform: scale(1.05);
  pointer-events: none;
}

#hero.hidden { display: none; }

#hero-canvas {
  position: absolute;
  inset: 0;
  z-index: 0;
}

#hero-content {
  position: relative;
  z-index: 1;
  max-width: 800px;
  padding: 2rem;
}

#hero h1 {
  font-family: var(--font-heading);
  font-size: clamp(2.4rem, 6vw, 4.5rem);
  font-weight: 700;
  color: var(--gold-bright);
  letter-spacing: 0.02em;
  line-height: 1.15;
  margin-bottom: 0.6rem;
  text-shadow: 0 0 80px rgba(201, 169, 110, 0.4), 0 0 160px rgba(201, 169, 110, 0.15);
  opacity: 0; transform: translateY(30px);
  animation: heroReveal 1s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

#hero .subtitle {
  font-family: var(--font-heading);
  font-size: clamp(1rem, 2.5vw, 1.4rem);
  font-weight: 400; font-style: italic;
  color: var(--text-dim);
  margin-bottom: 0.4rem;
  opacity: 0; transform: translateY(20px);
  animation: heroReveal 1s 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

#hero .manner {
  font-family: var(--font-body);
  font-size: 0.95rem;
  color: var(--gold-dim); font-style: italic;
  margin-bottom: 3rem;
  opacity: 0; transform: translateY(20px);
  animation: heroReveal 1s 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.enter-scroll {
  display: inline-block;
  padding: 0.9rem 2.8rem;
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  font-family: var(--font-heading);
  font-size: 1.1rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  background: transparent;
  position: relative;
  overflow: hidden;
  opacity: 0; transform: translateY(20px);
  animation: heroReveal 1s 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.enter-scroll::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(201,169,110,0.2), transparent 60%);
  opacity: 0;
  transition: opacity 0.3s;
}

.enter-scroll:hover { border-color: var(--gold); box-shadow: 0 0 40px rgba(201,169,110,0.2), inset 0 0 40px rgba(201,169,110,0.05); transform: translateY(-2px) !important; }
.enter-scroll:hover::before { opacity: 1; }
.enter-scroll:active { transform: scale(0.97) !important; }

.scroll-hint {
  position: absolute;
  bottom: 2.5rem; left: 50%;
  transform: translateX(-50%);
  color: var(--gold-dim);
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-family: var(--font-heading);
  opacity: 0;
  animation: fadeIn 1s 1.5s forwards, hintFloat 3s 2.5s ease-in-out infinite;
}

@keyframes heroReveal {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn { to { opacity: 0.6; } }
@keyframes hintFloat {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-10px); }
}

/* ═══════════════════════════════════════════════
   CHAPTER COUNTER — floating indicator
   ═══════════════════════════════════════════════ */
#chapter-indicator {
  position: fixed;
  top: 1rem; right: 1rem;
  z-index: 200;
  font-family: var(--font-heading);
  font-size: 0.8rem;
  color: var(--gold-dim);
  letter-spacing: 0.06em;
  background: rgba(6,6,14,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 0.4rem 0.9rem;
  border: 1px solid var(--border);
  border-radius: 20px;
  opacity: 0;
  transform: translateY(-10px);
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  pointer-events: none;
}

#chapter-indicator.show {
  opacity: 1;
  transform: translateY(0);
}

/* ═══════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════ */
#app {
  opacity: 0;
  transition: opacity 0.6s 0.2s ease;
}

#app.visible {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
  opacity: 1;
}

/* ═══════════════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════════════ */
#sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: rgba(6,6,14,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  z-index: 100;
  padding: 1.2rem 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

#sidebar-header {
  padding: 0.6rem 1.3rem 1rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0.6rem;
}

#sidebar-header h2 {
  font-family: var(--font-heading);
  font-size: 0.95rem;
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 0.06em;
}

#reading-progress {
  margin-top: 0.7rem;
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  overflow: hidden;
}

#reading-progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright));
  transition: width 0.2s linear;
  box-shadow: 0 0 8px rgba(201, 169, 110, 0.4);
}

.nav-part { margin-bottom: 0.15rem; }

.nav-part-title {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.45rem 1.3rem;
  font-family: var(--font-heading);
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--gold-dim);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  cursor: pointer;
  user-select: none;
  transition: color 0.25s, background 0.25s;
  border-radius: 2px;
}

.nav-part-title:hover { color: var(--gold); background: var(--sacred); }

.nav-part-title .chevron {
  font-size: 0.55rem;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  display: inline-block;
}

.nav-part.collapsed .chevron { transform: rotate(-90deg); }
.nav-part.collapsed .nav-letters {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
}

.nav-letters {
  padding: 0.1rem 0;
  max-height: 2000px;
  opacity: 1;
  transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
  overflow: hidden;
}

.nav-letter {
  display: block;
  padding: 0.32rem 1.3rem 0.32rem 1.9rem;
  font-family: var(--font-body);
  font-size: 0.8rem;
  color: var(--text-dim);
  text-decoration: none;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  border-left: 2px solid transparent;
  line-height: 1.35;
  position: relative;
}

.nav-letter:hover {
  color: var(--text-bright);
  background: var(--sacred);
  padding-left: 2.1rem;
}

.nav-letter.active {
  color: var(--gold-bright);
  border-left-color: var(--gold);
  background: var(--gold-glow);
  font-weight: 600;
}

/* ═══════════════════════════════════════════════
   CONTENT
   ═══════════════════════════════════════════════ */
#content {
  grid-column: 2;
  padding: 2.5rem 2rem 8rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* Floating particles canvas behind content */
#particles-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

.chapter {
  max-width: var(--content-max);
  width: 100%;
  padding: 2rem 0;
  position: relative;
  z-index: 1;
}

/* Staggered children reveal */
.chapter > * {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

.chapter.visible > * {
  opacity: 1;
  transform: translateY(0);
}

/* Stagger delay for children */
.chapter.visible > *:nth-child(1) { transition-delay: 0s; }
.chapter.visible > *:nth-child(2) { transition-delay: 0.04s; }
.chapter.visible > *:nth-child(3) { transition-delay: 0.08s; }
.chapter.visible > *:nth-child(4) { transition-delay: 0.12s; }
.chapter.visible > *:nth-child(5) { transition-delay: 0.16s; }
.chapter.visible > *:nth-child(6) { transition-delay: 0.2s; }
.chapter.visible > *:nth-child(7) { transition-delay: 0.22s; }
.chapter.visible > *:nth-child(n+8) { transition-delay: 0.24s; }

/* ═══════════════════════════════════════════════
   SACRED DIVIDERS
   ═══════════════════════════════════════════════ */
.sacred-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2.5rem 0;
  gap: 1.5rem;
  max-width: var(--content-max);
  width: 100%;
  z-index: 1;
}

.sacred-divider .line {
  flex: 1;
  max-width: 140px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
}

.sacred-divider .symbol {
  color: var(--gold-dim);
  transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.sacred-divider .symbol svg {
  width: 32px; height: 32px;
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.sacred-divider:hover .symbol { color: var(--gold); }
.sacred-divider:hover .symbol svg { transform: rotate(180deg) scale(1.15); }
.sacred-divider:hover .line { background: linear-gradient(90deg, transparent, var(--gold), transparent); }

/* ═══════════════════════════════════════════════
   TYPOGRAPHY — Alive and breathing
   ═══════════════════════════════════════════════ */
.chapter h2 {
  font-family: var(--font-heading);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--gold);
  margin: 2.5rem 0 0.8rem;
  letter-spacing: 0.02em;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border-subtle);
}

.chapter h3 {
  font-family: var(--font-heading);
  font-size: 1.9rem;
  font-weight: 700;
  color: var(--gold-bright);
  margin: 0 0 1.2rem;
  letter-spacing: 0.01em;
  line-height: 1.25;
  text-shadow: 0 0 50px rgba(201, 169, 110, 0.2);
  position: relative;
}

/* Glowing underline for letter titles */
.chapter h3::after {
  content: '';
  display: block;
  width: 0;
  height: 2px;
  margin-top: 0.5rem;
  background: linear-gradient(90deg, var(--gold), transparent);
  transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 0 10px rgba(201, 169, 110, 0.3);
}

.chapter.visible h3::after {
  width: 60%;
}

.chapter h4 {
  font-family: var(--font-heading);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--gold);
  margin: 2rem 0 0.6rem;
}

.chapter p {
  margin-bottom: 1.2rem;
  font-weight: 300;
}

.chapter p strong {
  font-weight: 600;
  color: var(--text-bright);
}

.chapter p em {
  color: var(--gold);
  font-style: italic;
}

/* Drop cap for opening paragraph of each chapter */
.chapter > p:first-of-type::first-letter {
  font-family: var(--font-heading);
  font-size: 3.4em;
  float: left;
  line-height: 0.8;
  margin: 0.05em 0.12em 0 0;
  color: var(--gold-bright);
  text-shadow: 0 0 20px rgba(201, 169, 110, 0.3);
}

.chapter blockquote {
  border-left: 3px solid var(--gold-dim);
  margin: 1.5rem 0;
  padding: 0.8rem 1.5rem;
  background: var(--sacred);
  border-radius: 0 6px 6px 0;
  font-style: italic;
  color: var(--text-dim);
  transition: border-color 0.3s, background 0.3s;
}

.chapter blockquote:hover {
  border-left-color: var(--gold);
  background: rgba(201, 169, 110, 0.06);
}

.chapter blockquote p { margin-bottom: 0.5rem; }
.chapter blockquote p:last-child { margin-bottom: 0; }

.chapter ul, .chapter ol { margin: 1rem 0 1.2rem; padding-left: 1.5rem; }
.chapter li { margin-bottom: 0.4rem; font-weight: 300; }
.chapter li strong { font-weight: 600; color: var(--text-bright); }

.chapter hr {
  border: none; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 2.5rem 0;
}

/* CODE — Glowing incantations */
.chapter code {
  font-family: var(--font-code);
  font-size: 0.82em;
  background: var(--bg-code);
  color: var(--gold);
  padding: 0.15em 0.4em;
  border-radius: 3px;
  border: 1px solid var(--border-subtle);
}

.chapter pre {
  margin: 1.5rem 0;
  padding: 1.2rem 1.5rem;
  background: var(--bg-code);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow-x: auto;
  position: relative;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.chapter pre:hover {
  border-color: var(--gold-dim);
  box-shadow: 0 0 30px rgba(201, 169, 110, 0.06), inset 0 0 30px rgba(201, 169, 110, 0.02);
}

.chapter pre code {
  background: none; border: none; padding: 0;
  font-size: 0.8rem; line-height: 1.6;
  color: var(--text); white-space: pre; display: block;
  font-variant-ligatures: none; tab-size: 4;
}

/* Copy button on code blocks */
.code-copy {
  position: absolute;
  top: 0.6rem; right: 0.6rem;
  background: rgba(201, 169, 110, 0.1);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-code);
  font-size: 0.65rem;
  padding: 0.25rem 0.6rem;
  border-radius: 4px;
  cursor: pointer;
  opacity: 0;
  transition: all 0.2s;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.chapter pre:hover .code-copy { opacity: 1; }
.code-copy:hover { background: rgba(201, 169, 110, 0.2); color: var(--gold); border-color: var(--gold-dim); }
.code-copy.copied { color: var(--gold-bright); border-color: var(--gold); }

/* Links */
.chapter a {
  color: var(--gold);
  text-decoration: none;
  background-image: linear-gradient(var(--gold-dim), var(--gold-dim));
  background-size: 100% 1px;
  background-position: 0 100%;
  background-repeat: no-repeat;
  transition: background-size 0.3s, color 0.2s;
}

.chapter a:hover {
  color: var(--gold-bright);
  background-image: linear-gradient(var(--gold), var(--gold));
  background-size: 100% 2px;
}

/* ═══════════════════════════════════════════════
   CHAPTER MARKER — Adinkra with glow
   ═══════════════════════════════════════════════ */
.chapter-marker {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 0.8rem;
}

.chapter-marker svg {
  width: 30px; height: 30px;
  opacity: 0.4;
  filter: drop-shadow(0 0 6px rgba(201, 169, 110, 0.3));
  transition: all 0.4s;
}

.chapter.visible .chapter-marker svg {
  opacity: 0.7;
  animation: markerPulse 3s ease-in-out infinite;
}

@keyframes markerPulse {
  0%, 100% { filter: drop-shadow(0 0 6px rgba(201, 169, 110, 0.2)); }
  50% { filter: drop-shadow(0 0 14px rgba(201, 169, 110, 0.5)); }
}

/* ═══════════════════════════════════════════════
   MOBILE
   ═══════════════════════════════════════════════ */
#mobile-toggle {
  display: none;
  position: fixed;
  top: 0.8rem; left: 0.8rem;
  z-index: 200;
  width: 42px; height: 42px;
  border: 1px solid var(--border);
  background: rgba(6,6,14,0.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--gold);
  font-size: 1.1rem;
  cursor: pointer;
  border-radius: 8px;
  align-items: center;
  justify-content: center;
  transition: all 0.25s;
}

#mobile-toggle:hover { border-color: var(--gold-dim); background: rgba(201,169,110,0.1); }
#mobile-toggle:active { transform: scale(0.92); }

#sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 90;
  opacity: 0;
  transition: opacity 0.35s;
}
#sidebar-overlay.open { display: block; opacity: 1; }

/* Back to top */
#back-to-top {
  position: fixed;
  bottom: 2rem; right: 2rem;
  width: 44px; height: 44px;
  border: 1px solid var(--border);
  background: rgba(6,6,14,0.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--gold-dim);
  font-size: 1.1rem;
  cursor: pointer;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: translateY(10px) scale(0.9);
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 50;
}

#back-to-top.show { opacity: 1; transform: translateY(0) scale(1); }
#back-to-top:hover { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 20px rgba(201,169,110,0.15); }
#back-to-top:active { transform: scale(0.9); }

/* ═══════════════════════════════════════════════
   KEYBOARD HINTS
   ═══════════════════════════════════════════════ */
#keyboard-hint {
  position: fixed;
  bottom: 1rem; left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-code);
  font-size: 0.65rem;
  color: var(--text-dim);
  background: rgba(6,6,14,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 0.35rem 0.9rem;
  border: 1px solid var(--border);
  border-radius: 20px;
  opacity: 0;
  transition: opacity 0.5s;
  z-index: 50;
  pointer-events: none;
  letter-spacing: 0.04em;
}

#keyboard-hint.show { opacity: 0.7; }

/* ═══════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════ */
@media (max-width: 960px) {
  :root { --sidebar-w: 280px; }
  #app.visible { grid-template-columns: 1fr; }
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); box-shadow: 4px 0 30px rgba(0,0,0,0.6); }
  #mobile-toggle { display: flex; }
  #content { grid-column: 1; padding: 3rem 1.2rem 5rem; }
  #chapter-indicator { display: none; }
  body { font-size: 17px; }
  .chapter h3 { font-size: 1.5rem; }
  .chapter > p:first-of-type::first-letter { font-size: 2.8em; }
}

@media (max-width: 480px) {
  body { font-size: 16px; }
  #hero h1 { font-size: 1.9rem; }
  .chapter pre { padding: 0.8rem; }
  .chapter pre code { font-size: 0.72rem; }
  .chapter > p:first-of-type::first-letter { font-size: 2.4em; }
}

/* ═══════════════════════════════════════════════
   LOADING
   ═══════════════════════════════════════════════ */
#loading {
  display: flex; align-items: center; justify-content: center;
  min-height: 60vh;
  color: var(--text-dim);
  font-family: var(--font-heading);
  font-size: 1.1rem;
}

.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-right: 1rem;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════════════
   PRINT
   ═══════════════════════════════════════════════ */
@media print {
  #sidebar, #mobile-toggle, #back-to-top, #hero, #particles-canvas,
  #top-progress, #chapter-indicator, #keyboard-hint,
  .sacred-divider, .chapter-marker, .code-copy { display: none !important; }
  #app.visible { display: block !important; }
  #content { padding: 0 !important; }
  .chapter, .chapter > * { opacity: 1 !important; transform: none !important; max-width: 100%; }
  body { color: #000; background: #fff; font-size: 11pt; }
  .chapter h3 { color: #000; text-shadow: none; }
  .chapter h3::after { display: none; }
  .chapter pre { border: 1px solid #ccc; }
  .chapter > p:first-of-type::first-letter { color: #333; text-shadow: none; }
}

<body>

<section id="hero">
  <canvas id="hero-canvas"></canvas>
  <div id="hero-content">
    <h1>Letters on the Universal Machine</h1>
    <p class="subtitle">A Treatise on WebAssembly, from Transistors to Transcendence</p>
    <p class="manner">In the manner of Euler's Letters to a German Princess</p>

  </div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
/* ═══════════════════════════════════════════════
   GLOBALS
   ═══════════════════════════════════════════════ */
let chapters = [];
let currentChapterIdx = 0;
let mouseX = 0, mouseY = 0;

document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
});

/* ═══════════════════════════════════════════════
   HERO — Interactive particle field
   Mouse-reactive sacred geometry
   ═══════════════════════════════════════════════ */
(function initHero() {
  const canvas = document.getElementById('hero-canvas');
  const ctx = canvas.getContext('2d');
  let w, h, stopped = false;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Particle field
  const particles = [];
  const PARTICLE_COUNT = 80;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x: Math.random() * 2000,
      y: Math.random() * 2000,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.8 + 0.5,
      alpha: Math.random() * 0.4 + 0.1,
      pulse: Math.random() * Math.PI * 2,
    });
  }

  function drawCircle(cx, cy, r, alpha) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(201, 169, 110, ${alpha})`;
    ctx.lineWidth = 0.7;
    ctx.stroke();
  }

  function drawFlowerOfLife(cx, cy, r, alpha, rot) {
    drawCircle(cx, cy, r, alpha);
    for (let i = 0; i < 6; i++) {
      const a = (i * Math.PI / 3) + rot;
      const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
      drawCircle(x, y, r, alpha);
      // Second ring
      for (let j = -1; j <= 1; j += 2) {
        const a2 = a + j * Math.PI / 3;
        drawCircle(x + r * Math.cos(a2), y + r * Math.sin(a2), r, alpha * 0.5);
      }
    }
  }

  function drawMetatron(cx, cy, r, alpha, rot) {
    const pts = [[cx, cy]];
    for (let ring = 1; ring <= 2; ring++) {
      for (let i = 0; i < 6; i++) {
        const a = (i * Math.PI / 3) + rot;
        pts.push([cx + r * ring * Math.cos(a), cy + r * ring * Math.sin(a)]);
      }
    }
    ctx.strokeStyle = `rgba(201, 169, 110, ${alpha * 0.25})`;
    ctx.lineWidth = 0.35;
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        ctx.beginPath();
        ctx.moveTo(pts[i][0], pts[i][1]);
        ctx.lineTo(pts[j][0], pts[j][1]);
        ctx.stroke();
      }
    }
    pts.forEach(([x, y]) => {
      ctx.beginPath();
      ctx.arc(x, y, 1.8, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201, 169, 110, ${alpha * 0.5})`;
      ctx.fill();
    });
  }

  function drawFractal(cx, cy, size, depth, alpha, rot) {
    if (depth <= 0 || size < 3) return;
    const pts = [];
    for (let i = 0; i < 3; i++) {
      const a = (i * 2 * Math.PI / 3) - Math.PI / 2 + rot;
      pts.push([cx + size * Math.cos(a), cy + size * Math.sin(a)]);
    }
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    pts.forEach(p => ctx.lineTo(p[0], p[1]));
    ctx.closePath();
    ctx.strokeStyle = `rgba(201, 169, 110, ${alpha})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
    for (let i = 0; i < 3; i++) {
      const mx = (pts[i][0] + pts[(i + 1) % 3][0]) / 2;
      const my = (pts[i][1] + pts[(i + 1) % 3][1]) / 2;
      drawFractal(mx, my, size * 0.45, depth - 1, alpha * 0.65, rot + 0.1);
    }
  }

  let frame = 0;
  function animate() {
    if (stopped) return;
    frame++;
    ctx.clearRect(0, 0, w, h);
    const t = frame * 0.004;
    const cx = w / 2, cy = h / 2;
    const r = Math.min(w, h) * 0.075;

    // Mouse influence on geometry
    const mdx = (mouseX - cx) / w;
    const mdy = (mouseY - cy) / h;
    const gx = cx + mdx * 30;
    const gy = cy + mdy * 30;

    // Breathing glow behind geometry
    const breathe = 0.5 + 0.5 * Math.sin(t * 0.8);
    const glowR = r * 3.5;
    const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, glowR);
    grad.addColorStop(0, `rgba(201, 169, 110, ${0.04 + breathe * 0.03})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(gx - glowR, gy - glowR, glowR * 2, glowR * 2);

    // Central sacred geometry (reacts to mouse)
    drawFlowerOfLife(gx, gy, r, 0.14, t * 0.15);
    drawMetatron(gx, gy, r * 0.85, 0.1, -t * 0.12 + mdx * 0.3);

    // Corner fractals
    const cs = Math.min(w, h) * 0.11;
    drawFractal(w * 0.1, h * 0.12, cs, 3, 0.055, t * 0.08);
    drawFractal(w * 0.9, h * 0.12, cs, 3, 0.055, -t * 0.08);
    drawFractal(w * 0.1, h * 0.88, cs, 3, 0.055, -t * 0.06);
    drawFractal(w * 0.9, h * 0.88, cs, 3, 0.055, t * 0.06);

    // Particles
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.pulse += 0.02;
      if (p.x < 0) p.x = w;
      if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h;
      if (p.y > h) p.y = 0;

      // Mouse attraction
      const dx = mouseX - p.x, dy = mouseY - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 200 && dist > 0) {
        const force = 0.02 * (1 - dist / 200);
        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force;
      }
      // Damping
      p.vx *= 0.99;
      p.vy *= 0.99;

      const a = p.alpha * (0.7 + 0.3 * Math.sin(p.pulse));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201, 169, 110, ${a})`;
      ctx.fill();
    });

    // Connection lines between nearby particles
    ctx.lineWidth = 0.3;
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d = dx * dx + dy * dy;
        if (d < 12000) {
          const a = 0.06 * (1 - d / 12000);
          ctx.strokeStyle = `rgba(201, 169, 110, ${a})`;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }

    // Orbiting points
    for (let i = 0; i < 16; i++) {
      const a = (i * Math.PI / 8) + t * 0.35;
      const orbitR = r * 2.6 + Math.sin(t * 1.2 + i * 0.7) * 20;
      const x = gx + orbitR * Math.cos(a);
      const y = gy + orbitR * Math.sin(a);
      ctx.beginPath();
      ctx.arc(x, y, 1.2 + Math.sin(t + i) * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201, 169, 110, ${0.15 + 0.1 * Math.sin(t * 2 + i)})`;
      ctx.fill();
    }

    requestAnimationFrame(animate);
  }
  animate();

  // Button mouse tracking for radial highlight
  const btn = document.getElementById('enter-btn');
  btn.addEventListener('mousemove', e => {
    const r = btn.getBoundingClientRect();
    btn.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');
    btn.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100) + '%');
  });

  window._stopHero = () => { stopped = true; };
})();

/* ═══════════════════════════════════════════════
   READING PARTICLES — Ambient energy while reading
   ═══════════════════════════════════════════════ */
(function initReadingParticles() {
  const canvas = document.getElementById('particles-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let w, h, active = false;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const pts = [];
  for (let i = 0; i < 35; i++) {
    pts.push({
      x: Math.random() * 3000,
      y: Math.random() * 3000,
      vx: (Math.random() - 0.5) * 0.15,
      vy: -Math.random() * 0.2 - 0.05,
      r: Math.random() * 1.5 + 0.3,
      alpha: Math.random() * 0.25 + 0.05,
      pulse: Math.random() * Math.PI * 2,
    });
  }

  function animate() {
    if (!active) return;
    ctx.clearRect(0, 0, w, h);
    pts.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.pulse += 0.015;
      if (p.y < -10) { p.y = h + 10; p.x = Math.random() * w; }
      if (p.x < 0) p.x = w;
      if (p.x > w) p.x = 0;
      const a = p.alpha * (0.6 + 0.4 * Math.sin(p.pulse));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201, 169, 110, ${a})`;
      ctx.fill();
    });
    requestAnimationFrame(animate);
  }

  window._startReadingParticles = () => { active = true; animate(); };
})();

/* ═══════════════════════════════════════════════
   ADINKRA SYMBOLS
   ═══════════════════════════════════════════════ */

    <circle cx="20" cy="20" r="8"/>
    <line x1="20" y1="4" x2="20" y2="12"/><line x1="20" y1="28" x2="20" y2="36"/>

  </svg>`,

const adinkraKeys = Object.keys(adinkra);
function getAdinkraSVG(i) { return adinkra[adinkraKeys[i % adinkraKeys.length]]; }

function makeSacredDivider(i) {
  return `<div class="sacred-divider">
    <span class="line"></span>
    <span class="symbol">${getAdinkraSVG(i)}</span>
    <span class="line"></span>
  </div>`;

/* ═══════════════════════════════════════════════
   PARSER
   ═══════════════════════════════════════════════ */
function parseTreatise(md) {
  const lines = md.split('\n');
  const chs = [];
  let cur = null, part = '';

  for (const line of lines) {
    if (/^## Part \w+:/.test(line)) part = line.replace(/^## /, '');
    if (/^### Letter \d+/.test(line) || /^## Preface/.test(line) || /^## Epilogue/.test(line)) {
      if (cur) chs.push(cur);
      const title = line.replace(/^#{2,3}\s+/, '');
      const id = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
      cur = { title, id, part, lines: [line] };
    } else if (cur) {
      cur.lines.push(line);
    }
  }
  if (cur) chs.push(cur);
  return chs;
}

/* ═══════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════ */
function buildNavigation(chs) {
  const tree = document.getElementById('nav-tree');
  const parts = new Map();

  chs.forEach((ch, i) => {
    const key = ch.part || 'Introduction';
    if (!parts.has(key)) parts.set(key, []);
    parts.get(key).push({ ...ch, index: i });
  });

  let html = '';
  let pi = 0;
  parts.forEach((letters, name) => {
    html += `<div class="nav-part" data-part="${pi}">
      <div class="nav-part-title" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="chevron">&#9660;</span>
        <span>${name === 'Introduction' ? 'Preface' : name}</span>
      </div>
      <div class="nav-letters">`;
    letters.forEach(ch => {
      const short = ch.title.length > 42 ? ch.title.substring(0, 40) + '\u2026' : ch.title;
      html += `<a class="nav-letter" data-target="${ch.id}" data-index="${ch.index}" onclick="scrollToChapter('${ch.id}')">${short}</a>`;
    });
    html += `</div></div>`;
    pi++;
  });

  tree.innerHTML = html;
}

/* ═══════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════ */
function renderChapters(chs) {
  const content = document.getElementById('content');
  marked.setOptions({ breaks: false, gfm: true });

  let html = '';
  chs.forEach((ch, i) => {
    const rendered = marked.parse(ch.lines.join('\n'));
    html += `<article class="chapter" id="${ch.id}" data-index="${i}">
      <div class="chapter-marker">${getAdinkraSVG(i)}</div>
      ${rendered}
    </article>`;
    if (i < chs.length - 1) html += makeSacredDivider(i);
  });

  content.innerHTML = html;

  // Add copy buttons to code blocks
  content.querySelectorAll('pre').forEach(pre => {
    const btn = document.createElement('button');
    btn.className = 'code-copy';
    btn.textContent = 'copy';
    btn.onclick = () => {
      const code = pre.querySelector('code');
      if (code) {
        navigator.clipboard.writeText(code.textContent).then(() => {
          btn.textContent = 'copied';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
        });
      }
    };
    pre.appendChild(btn);
  });
}

/* ═══════════════════════════════════════════════
   SCROLLSPY + REVEAL
   ═══════════════════════════════════════════════ */
function initObservers() {
  // Scrollspy
  const spy = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        const idx = parseInt(entry.target.dataset.index);
        currentChapterIdx = idx;

        document.querySelectorAll('.nav-letter').forEach(el => el.classList.remove('active'));
        const navItem = document.querySelector(`.nav-letter[data-target="${id}"]`);
        if (navItem) {
          navItem.classList.add('active');
          navItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
          const part = navItem.closest('.nav-part');
          if (part) part.classList.remove('collapsed');
        }

        // Update chapter indicator
        const indicator = document.getElementById('chapter-indicator');
        const ch = chapters[idx];
        if (ch) {
          const short = ch.title.length > 50 ? ch.title.substring(0, 48) + '\u2026' : ch.title;
          indicator.textContent = `${idx + 1} / ${chapters.length} \u2014 ${short}`;
        }
      }
    });
  }, { rootMargin: '-15% 0px -65% 0px' });

  // Reveal on scroll
  const reveal = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        reveal.unobserve(entry.target); // Only animate once
      }
    });
  }, { rootMargin: '0px 0px -60px 0px', threshold: 0.02 });

  document.querySelectorAll('.chapter').forEach(el => {
    spy.observe(el);
    reveal.observe(el);
  });
}

/* ═══════════════════════════════════════════════
   PROGRESS + BACK TO TOP
   ═══════════════════════════════════════════════ */
function initProgress() {
  const bar = document.getElementById('reading-progress-bar');
  const topBar = document.getElementById('top-progress');
  const btn = document.getElementById('back-to-top');
  const indicator = document.getElementById('chapter-indicator');
  const kbHint = document.getElementById('keyboard-hint');
  let hideTimer;

  function update() {
    const st = window.scrollY;
    const dh = document.documentElement.scrollHeight - window.innerHeight;
    const pct = dh > 0 ? (st / dh) * 100 : 0;
    bar.style.width = pct + '%';
    topBar.style.width = pct + '%';

    if (st > 400) {
      btn.classList.add('show');
      indicator.classList.add('show');
    } else {
      btn.classList.remove('show');
      indicator.classList.remove('show');
    }

    // Show keyboard hint briefly on first scroll
    if (st > 100 && st < 600) {
      kbHint.classList.add('show');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => kbHint.classList.remove('show'), 4000);
    }
  }

  window.addEventListener('scroll', update, { passive: true });
  update();
}

/* ═══════════════════════════════════════════════
   ACTIONS
   ═══════════════════════════════════════════════ */
function enterScroll() {
  const hero = document.getElementById('hero');
  const app = document.getElementById('app');

  hero.classList.add('exiting');
  app.style.display = 'grid';

  // Wait for hero exit animation
  setTimeout(() => {
    hero.classList.add('hidden');
    app.classList.add('visible');
    window.scrollTo(0, 0);
    window._startReadingParticles();
    window._stopHero();
  }, 600);
}

function scrollToChapter(id) {
  const el = document.getElementById(id);
  if (el) {
    const offset = 20;
    const y = el.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top: y, behavior: 'smooth' });
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

/* ═══════════════════════════════════════════════
   KEYBOARD NAVIGATION
   ═══════════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
  // Don't intercept when typing in inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const hero = document.getElementById('hero');
  if (!hero.classList.contains('hidden')) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); enterScroll(); }
    return;
  }

  switch (e.key) {
    case 'j': // Next chapter
      e.preventDefault();
      if (currentChapterIdx < chapters.length - 1) {
        scrollToChapter(chapters[currentChapterIdx + 1].id);
      }
      break;
    case 'k': // Prev chapter
      e.preventDefault();
      if (currentChapterIdx > 0) {
        scrollToChapter(chapters[currentChapterIdx - 1].id);
      }
      break;
    case 't': // Top
      e.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      break;
    case 's': // Toggle sidebar
      e.preventDefault();
      toggleSidebar();
      break;
    case 'Escape':
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('open');
      break;
  }
});

/* ═══════════════════════════════════════════════
   EVENT BINDINGS
   ═══════════════════════════════════════════════ */
document.getElementById('enter-btn').addEventListener('click', enterScroll);
document.getElementById('mobile-toggle').addEventListener('click', toggleSidebar);
document.getElementById('sidebar-overlay').addEventListener('click', toggleSidebar);
document.getElementById('back-to-top').addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// Hero scroll detection
let heroActive = true;
window.addEventListener('scroll', () => {
  if (!heroActive) return;
  if (window.scrollY > window.innerHeight * 0.4) {
    heroActive = false;
    enterScroll();
  }
}, { passive: true });

/* ═══════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════ */
async function init() {
  try {
    const res = await fetch('TREATISE.md');
    if (!res.ok) throw new Error('Failed to load');
    const md = await res.text();
    chapters = parseTreatise(md);
    renderChapters(chapters);
    buildNavigation(chapters);
    initObservers();
    initProgress();
  } catch (err) {
    document.getElementById('loading').innerHTML =
      `<p style="color:var(--accent-crimson)">Could not load the treatise. ${err.message}</p>`;
  }
}

init();
</script>
