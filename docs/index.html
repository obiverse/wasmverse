<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Epistolary Library</title>
<meta name="description" content="Treatises in the manner of Euler's Letters to a German Princess — for builders who love the universe">
<meta name="theme-color" content="#0a0a14">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #06060e;
  --bg: #0a0a14;
  --bg-elevated: #0f0f1e;
  --text: #ddd5c4;
  --text-dim: #9e9684;
  --text-bright: #f0e8d8;
  --gold: #c9a96e;
  --gold-bright: #e4c98a;
  --gold-dim: #8b6914;
  --gold-glow: rgba(201, 169, 110, 0.12);
  --border: #1e1e30;
  --border-subtle: #16162a;
  --font-body: 'Crimson Pro', 'Georgia', serif;
  --font-heading: 'Cormorant Garamond', 'Palatino', serif;
  --font-code: 'JetBrains Mono', 'Consolas', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  min-height: 100vh;
}

::selection { background: var(--gold); color: var(--bg); }

/* ═══════════════════════════════════════════════
   HERO — Library entrance
   ═══════════════════════════════════════════════ */
.hero {
  position: relative;
  text-align: center;
  padding: 10vh 2rem 6vh;
  overflow: hidden;
  background: radial-gradient(ellipse at center, #0f0f20 0%, var(--bg-deep) 70%);
}

.hero canvas {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.hero-inner {
  position: relative;
  z-index: 1;
  max-width: 700px;
  margin: 0 auto;
}

.hero h1 {
  font-family: var(--font-heading);
  font-size: clamp(2rem, 5vw, 3.6rem);
  font-weight: 700;
  color: var(--gold-bright);
  letter-spacing: 0.02em;
  line-height: 1.15;
  margin-bottom: 0.5rem;
  text-shadow: 0 0 80px rgba(201, 169, 110, 0.3);
  opacity: 0; transform: translateY(25px);
  animation: reveal 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.hero .tagline {
  font-family: var(--font-heading);
  font-size: clamp(0.95rem, 2vw, 1.2rem);
  font-style: italic;
  color: var(--text-dim);
  margin-bottom: 0.5rem;
  opacity: 0; transform: translateY(15px);
  animation: reveal 0.8s 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.hero .credit {
  font-family: var(--font-body);
  font-size: 0.8rem;
  color: var(--gold-dim);
  font-style: italic;
  opacity: 0;
  animation: reveal 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes reveal {
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════
   BOOK GRID
   ═══════════════════════════════════════════════ */
.books-section {
  max-width: 960px;
  margin: 0 auto;
  padding: 2rem 1.5rem 6rem;
}

.books-section h2 {
  font-family: var(--font-code);
  font-size: 0.7rem;
  color: var(--gold-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
  text-align: center;
}

.books-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 1.5rem;
}

/* ═══════════════════════════════════════════════
   BOOK CARD
   ═══════════════════════════════════════════════ */
.book-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 2rem 1.8rem;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  text-decoration: none;
  display: block;
  color: inherit;
}

.book-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--card-accent, var(--gold)), transparent);
  opacity: 0.5;
  transition: opacity 0.3s;
}

.book-card:hover {
  border-color: var(--gold-dim);
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 40px rgba(201,169,110,0.06);
}

.book-card:hover::before { opacity: 1; }
.book-card:active { transform: translateY(-1px); }

.card-symbol {
  display: flex;
  justify-content: center;
  margin-bottom: 1.2rem;
}

.card-symbol svg {
  width: 44px; height: 44px;
  color: var(--card-accent, var(--gold));
  filter: drop-shadow(0 0 10px rgba(201,169,110,0.2));
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

.book-card:hover .card-symbol svg {
  transform: rotate(15deg) scale(1.1);
}

.card-title {
  font-family: var(--font-heading);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--gold-bright);
  text-align: center;
  margin-bottom: 0.3rem;
  line-height: 1.25;
}

.card-subtitle {
  font-family: var(--font-heading);
  font-size: 0.95rem;
  font-style: italic;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 1rem;
}

.card-desc {
  font-family: var(--font-body);
  font-size: 0.88rem;
  font-weight: 300;
  color: var(--text);
  line-height: 1.65;
  margin-bottom: 1.2rem;
}

.card-meta {
  display: flex;
  gap: 1rem;
  justify-content: center;
  font-family: var(--font-code);
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.04em;
}

.card-meta span { color: var(--gold-dim); }

.card-enter {
  display: block;
  text-align: center;
  margin-top: 1.2rem;
  font-family: var(--font-heading);
  font-size: 0.85rem;
  color: var(--gold);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.6;
  transition: opacity 0.3s;
}

.book-card:hover .card-enter { opacity: 1; }

/* ═══════════════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════════════ */
.footer {
  text-align: center;
  padding: 2rem;
  font-family: var(--font-body);
  font-size: 0.8rem;
  color: var(--text-dim);
  font-style: italic;
  border-top: 1px solid var(--border-subtle);
  max-width: 600px;
  margin: 0 auto;
}

.footer a { color: var(--gold-dim); text-decoration: none; }
.footer a:hover { color: var(--gold); }

/* ═══════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════ */
@media (max-width: 480px) {
  .hero { padding: 8vh 1rem 4vh; }
  .books-section { padding: 1.5rem 1rem 4rem; }
  .books-grid { grid-template-columns: 1fr; }
  .book-card { padding: 1.5rem 1.2rem; }
  .card-title { font-size: 1.3rem; }
}
</style>
</head>
<body>

<section class="hero">
  <canvas id="hero-canvas"></canvas>
  <div class="hero-inner">
    <h1>The Epistolary Library</h1>
    <p class="tagline">Treatises in the manner of Euler's Letters to a German Princess</p>
    <p class="credit">For builders who love the universe</p>
  </div>
</section>

<section class="books-section">
  <h2>Available Treatises</h2>
  <div class="books-grid" id="books-grid">
    <!-- Populated from manifest.json -->
  </div>
</section>

<footer class="footer">
  <a href="https://github.com/obiverse/wasmverse">Wasmverse</a>, 2026
</footer>

<script>
/* ═══════════════════════════════════════════════
   ADINKRA SYMBOLS
   ═══════════════════════════════════════════════ */
const adinkraSVGs = {
  nsoromma: `<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.2">
    <circle cx="20" cy="20" r="8"/>
    <line x1="20" y1="4" x2="20" y2="12"/><line x1="20" y1="28" x2="20" y2="36"/>
    <line x1="4" y1="20" x2="12" y2="20"/><line x1="28" y1="20" x2="36" y2="20"/>
    <line x1="8.7" y1="8.7" x2="14.3" y2="14.3"/><line x1="25.7" y1="25.7" x2="31.3" y2="31.3"/>
    <line x1="31.3" y1="8.7" x2="25.7" y2="14.3"/><line x1="14.3" y1="25.7" x2="8.7" y2="31.3"/>
  </svg>`,
  sankofa: `<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.2">
    <path d="M20 6 C30 6 34 14 34 20 C34 28 28 34 20 34 C12 34 6 28 6 20"/>
    <path d="M6 20 C6 14 10 10 14 10"/>
    <circle cx="14" cy="10" r="2.5" fill="currentColor"/>
  </svg>`,
  dwennimmen: `<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.2">
    <path d="M20 8 C14 8 8 12 8 20 C8 24 10 26 14 26"/>
    <path d="M20 8 C26 8 32 12 32 20 C32 24 30 26 26 26"/>
    <path d="M20 32 C14 32 8 28 8 20"/><path d="M20 32 C26 32 32 28 32 20"/>
    <line x1="20" y1="6" x2="20" y2="34"/>
  </svg>`,
  ananse: `<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.2">
    <circle cx="20" cy="20" r="4"/><circle cx="20" cy="20" r="10"/><circle cx="20" cy="20" r="16"/>
    <line x1="20" y1="4" x2="20" y2="36"/><line x1="4" y1="20" x2="36" y2="20"/>
    <line x1="8.7" y1="8.7" x2="31.3" y2="31.3"/><line x1="31.3" y1="8.7" x2="8.7" y2="31.3"/>
  </svg>`,
  funtun: `<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.2">
    <path d="M20 6 A14 14 0 0 1 20 34"/><path d="M20 6 A14 14 0 0 0 20 34"/>
    <circle cx="20" cy="13" r="3"/><circle cx="20" cy="27" r="3"/>
  </svg>`,
};

/* ═══════════════════════════════════════════════
   HERO CANVAS — Ambient sacred geometry
   ═══════════════════════════════════════════════ */
(function() {
  const canvas = document.getElementById('hero-canvas');
  const ctx = canvas.getContext('2d');
  let w, h;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = canvas.parentElement.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function drawCircle(cx, cy, r, alpha) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(201, 169, 110, ${alpha})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }

  let frame = 0;
  function animate() {
    frame++;
    ctx.clearRect(0, 0, w, h);
    const t = frame * 0.003;
    const cx = w / 2, cy = h / 2;
    const r = Math.min(w, h) * 0.06;

    // Seed of Life
    drawCircle(cx, cy, r, 0.08);
    for (let i = 0; i < 6; i++) {
      const a = (i * Math.PI / 3) + t * 0.1;
      drawCircle(cx + r * Math.cos(a), cy + r * Math.sin(a), r, 0.06);
    }

    // Orbiting dots
    for (let i = 0; i < 12; i++) {
      const a = (i * Math.PI / 6) + t * 0.25;
      const orbitR = r * 2.2 + Math.sin(t + i) * 10;
      ctx.beginPath();
      ctx.arc(cx + orbitR * Math.cos(a), cy + orbitR * Math.sin(a), 1, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201, 169, 110, ${0.12 + 0.08 * Math.sin(t * 2 + i)})`;
      ctx.fill();
    }

    requestAnimationFrame(animate);
  }
  animate();
})();

/* ═══════════════════════════════════════════════
   LOAD BOOKS FROM MANIFEST
   ═══════════════════════════════════════════════ */
async function loadLibrary() {
  try {
    const res = await fetch('books/manifest.json');
    const manifest = await res.json();
    const grid = document.getElementById('books-grid');

    manifest.books.forEach(book => {
      const symbol = adinkraSVGs[book.symbol] || adinkraSVGs.nsoromma;
      const card = document.createElement('a');
      card.className = 'book-card';
      card.href = `read.html?book=${book.id}`;
      card.style.setProperty('--card-accent', book.accent || '#c9a96e');
      card.innerHTML = `
        <div class="card-symbol">${symbol}</div>
        <div class="card-title">${book.title}</div>
        <div class="card-subtitle">${book.subtitle}</div>
        <p class="card-desc">${book.description}</p>
        <div class="card-meta">
          <span>${book.letters}</span> letters &middot;
          <span>${book.parts}</span> parts
        </div>
        <div class="card-enter">Begin Reading &rarr;</div>
      `;
      grid.appendChild(card);
    });
  } catch (err) {
    document.getElementById('books-grid').innerHTML =
      `<p style="color:#8b3a3a;text-align:center">Failed to load library: ${err.message}</p>`;
  }
}

loadLibrary();
</script>
</body>
</html>
