    <circle cx="100" cy="140" r="3"/><circle cx="140" cy="140" r="3"/><circle cx="180" cy="140" r="3"/>
    <circle cx="1020" cy="490" r="3"/><circle cx="1060" cy="490" r="3"/><circle cx="1100" cy="490" r="3"/>
    <circle cx="1020" cy="530" r="3"/><circle cx="1060" cy="530" r="3"/><circle cx="1100" cy="530" r="3"/>
  </g>
