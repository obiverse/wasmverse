<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Epistolary Library</title>
<meta name="description" content="Treatises in the manner of Euler's Letters">
<meta name="theme-color" content="#0a0a14">
<script>
// Self-healing PWA: nuke stale service workers and caches.
(function(){
  var V = 'v7';
  var KEY = 'epistolary_sw_version';
  var stored = localStorage.getItem(KEY);
  var purge = location.search.indexOf('purge') !== -1;

  if (purge || (stored && stored !== V)) {
    localStorage.removeItem(KEY);
    localStorage.removeItem('epistolary_pwa');
    if ('caches' in window) {
      caches.keys().then(function(keys) {
        return Promise.all(keys.map(function(k) { return caches.delete(k); }));
      });
    }
    if (navigator.serviceWorker) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      }).then(function() {
        if (purge) {
          location.replace(location.pathname);
        } else {
          location.reload();
        }
      });
    } else if (purge) {
      location.replace(location.pathname);
    }
  }
  localStorage.setItem(KEY, V);
})();
</script>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta property="og:title" content="The Epistolary Library">
<meta property="og:description" content="Treatises in the manner of Euler's Letters to a German Princess">
<meta property="og:type" content="article">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #06060e;
  --bg: #0a0a14;
  --bg-elevated: #0f0f1e;
  --bg-code: #0c0c18;
  --text: #ddd5c4;
  --text-dim: #9e9684;
  --text-bright: #f0e8d8;
  --gold: #c9a96e;
  --gold-bright: #e4c98a;
  --gold-dim: #8b6914;
  --gold-glow: rgba(201, 169, 110, 0.12);
  --sacred: rgba(201, 169, 110, 0.08);
  --border: #1e1e30;
  --border-subtle: #16162a;
  --accent-crimson: #8b3a3a;
  --sidebar-w: 300px;
  --content-max: 72ch;
  --font-body: 'Crimson Pro', 'Georgia', serif;
  --font-heading: 'Cormorant Garamond', 'Palatino', serif;
  --font-code: 'JetBrains Mono', 'Consolas', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: var(--gold-dim) var(--bg);
  overflow-x: hidden;
  max-width: 100vw;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }

body {
  font-family: var(--font-body);
  font-size: 19px;
  line-height: 1.85;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  max-width: 100vw;
  overflow-wrap: break-word;
  word-wrap: break-word;
}

::selection { background: var(--gold); color: var(--bg); }

/* ═══════════════════════════════════════════════
   TOP PROGRESS BAR — Always visible energy pulse
   ═══════════════════════════════════════════════ */
#top-progress {
  position: fixed;
  top: 0; left: 0;
  width: 0%;
  height: 3px;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright), var(--gold));
  z-index: 9999;
  transition: width 0.15s linear;
  box-shadow: 0 0 12px rgba(201, 169, 110, 0.5);
}

/* ═══════════════════════════════════════════════
   HERO — Cinematic gateway with particle field
   ═══════════════════════════════════════════════ */
#hero {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  z-index: 1000;
  background: var(--bg-deep);
  transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

#hero.exiting {
  opacity: 0;
  transform: scale(1.05);
  pointer-events: none;
}

#hero.hidden { display: none; }

#hero-canvas {
  position: absolute;
  inset: 0;
  z-index: 0;
}

#hero-content {
  position: relative;
  z-index: 1;
  max-width: 800px;
  padding: 2rem;
}

#hero h1 {
  font-family: var(--font-heading);
  font-size: clamp(2.4rem, 6vw, 4.5rem);
  font-weight: 700;
  color: var(--gold-bright);
  letter-spacing: 0.02em;
  line-height: 1.15;
  margin-bottom: 0.6rem;
  text-shadow: 0 0 80px rgba(201, 169, 110, 0.4), 0 0 160px rgba(201, 169, 110, 0.15);
  opacity: 0; transform: translateY(30px);
  animation: heroReveal 1s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

#hero .subtitle {
  font-family: var(--font-heading);
  font-size: clamp(1rem, 2.5vw, 1.4rem);
  font-weight: 400; font-style: italic;
  color: var(--text-dim);
  margin-bottom: 0.4rem;
  opacity: 0; transform: translateY(20px);
  animation: heroReveal 1s 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

#hero .manner {
  font-family: var(--font-body);
  font-size: 0.95rem;
  color: var(--gold-dim); font-style: italic;
  margin-bottom: 3rem;
  opacity: 0; transform: translateY(20px);
  animation: heroReveal 1s 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.enter-scroll {
  display: inline-block;
  padding: 0.9rem 2.8rem;
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  font-family: var(--font-heading);
  font-size: 1.1rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  background: transparent;
  position: relative;
  overflow: hidden;
  opacity: 0; transform: translateY(20px);
  animation: heroReveal 1s 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.enter-scroll::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(201,169,110,0.2), transparent 60%);
  opacity: 0;
  transition: opacity 0.3s;
}

.enter-scroll:hover { border-color: var(--gold); box-shadow: 0 0 40px rgba(201,169,110,0.2), inset 0 0 40px rgba(201,169,110,0.05); transform: translateY(-2px) !important; }
.enter-scroll:hover::before { opacity: 1; }
.enter-scroll:active { transform: scale(0.97) !important; }

.scroll-hint {
  position: absolute;
  bottom: 2.5rem; left: 50%;
  transform: translateX(-50%);
  color: var(--gold-dim);
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-family: var(--font-heading);
  opacity: 0;
  animation: fadeIn 1s 1.5s forwards, hintFloat 3s 2.5s ease-in-out infinite;
}

@keyframes heroReveal {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn { to { opacity: 0.6; } }
@keyframes hintFloat {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-10px); }
}

/* ═══════════════════════════════════════════════
   CHAPTER COUNTER — floating indicator
   ═══════════════════════════════════════════════ */
#chapter-indicator {
  position: fixed;
  top: 1rem; right: 1rem;
  z-index: 200;
  font-family: var(--font-heading);
  font-size: 0.8rem;
  color: var(--gold-dim);
  letter-spacing: 0.06em;
  background: rgba(6,6,14,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 0.4rem 0.9rem;
  border: 1px solid var(--border);
  border-radius: 20px;
  opacity: 0;
  transform: translateY(-10px);
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  pointer-events: none;
}

#chapter-indicator.show {
  opacity: 1;
  transform: translateY(0);
}

/* ═══════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════ */
#app {
  opacity: 0;
  transition: opacity 0.6s 0.2s ease;
}

#app.visible {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
  opacity: 1;
  max-width: 100vw;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════════════ */
#sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: rgba(6,6,14,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  z-index: 100;
  padding: 1.2rem 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

#sidebar-header {
  padding: 0.6rem 1.3rem 1rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0.6rem;
}

#sidebar-header h2 {
  font-family: var(--font-heading);
  font-size: 0.95rem;
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 0.06em;
}

#reading-progress {
  margin-top: 0.7rem;
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  overflow: hidden;
}

#reading-progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright));
  transition: width 0.2s linear;
  box-shadow: 0 0 8px rgba(201, 169, 110, 0.4);
}

.nav-part { margin-bottom: 0.15rem; }

.nav-part-title {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.45rem 1.3rem;
  font-family: var(--font-heading);
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--gold-dim);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  cursor: pointer;
  user-select: none;
  transition: color 0.25s, background 0.25s;
  border-radius: 2px;
}

.nav-part-title:hover { color: var(--gold); background: var(--sacred); }

.nav-part-title .chevron {
  font-size: 0.55rem;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  display: inline-block;
}

.nav-part.collapsed .chevron { transform: rotate(-90deg); }
.nav-part.collapsed .nav-letters {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
}

.nav-letters {
  padding: 0.1rem 0;
  max-height: 2000px;
  opacity: 1;
  transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
  overflow: hidden;
}

.nav-letter {
  display: block;
  padding: 0.32rem 1.3rem 0.32rem 1.9rem;
  font-family: var(--font-body);
  font-size: 0.8rem;
  color: var(--text-dim);
  text-decoration: none;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  border-left: 2px solid transparent;
  line-height: 1.35;
  position: relative;
}

.nav-letter:hover {
  color: var(--text-bright);
  background: var(--sacred);
  padding-left: 2.1rem;
}

.nav-letter.active {
  color: var(--gold-bright);
  border-left-color: var(--gold);
  background: var(--gold-glow);
  font-weight: 600;
}

/* ═══════════════════════════════════════════════
   CONTENT
   ═══════════════════════════════════════════════ */
#content {
  grid-column: 2;
  padding: 2.5rem 2rem 8rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  min-width: 0; /* prevent grid blowout */
  overflow-x: hidden;
}

/* Floating particles canvas behind content */
#particles-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

.chapter {
  max-width: var(--content-max);
  width: 100%;
  padding: 2rem 0;
  position: relative;
  z-index: 1;
  overflow-wrap: break-word;
  word-wrap: break-word;
  min-width: 0;
}

/* Staggered children reveal */
.chapter > * {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

.chapter.visible > * {
  opacity: 1;
  transform: translateY(0);
}

/* Stagger delay for children */
.chapter.visible > *:nth-child(1) { transition-delay: 0s; }
.chapter.visible > *:nth-child(2) { transition-delay: 0.04s; }
.chapter.visible > *:nth-child(3) { transition-delay: 0.08s; }
.chapter.visible > *:nth-child(4) { transition-delay: 0.12s; }
.chapter.visible > *:nth-child(5) { transition-delay: 0.16s; }
.chapter.visible > *:nth-child(6) { transition-delay: 0.2s; }
.chapter.visible > *:nth-child(7) { transition-delay: 0.22s; }
.chapter.visible > *:nth-child(n+8) { transition-delay: 0.24s; }

/* ═══════════════════════════════════════════════
   SACRED DIVIDERS
   ═══════════════════════════════════════════════ */
.sacred-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2.5rem 0;
  gap: 1.5rem;
  max-width: var(--content-max);
  width: 100%;
  z-index: 1;
}

.sacred-divider .line {
  flex: 1;
  max-width: 140px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
}

.sacred-divider .symbol {
  color: var(--gold-dim);
  transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.sacred-divider .symbol svg {
  width: 32px; height: 32px;
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.sacred-divider:hover .symbol { color: var(--gold); }
.sacred-divider:hover .symbol svg { transform: rotate(180deg) scale(1.15); }
.sacred-divider:hover .line { background: linear-gradient(90deg, transparent, var(--gold), transparent); }

/* ═══════════════════════════════════════════════
   TYPOGRAPHY — Alive and breathing
   ═══════════════════════════════════════════════ */
.chapter h2 {
  font-family: var(--font-heading);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--gold);
  margin: 2.5rem 0 0.8rem;
  letter-spacing: 0.02em;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border-subtle);
}

.chapter h3 {
  font-family: var(--font-heading);
  font-size: 1.9rem;
  font-weight: 700;
  color: var(--gold-bright);
  margin: 0 0 1.2rem;
  letter-spacing: 0.01em;
  line-height: 1.25;
  text-shadow: 0 0 50px rgba(201, 169, 110, 0.2);
  position: relative;
}

/* Glowing underline for letter titles */
.chapter h3::after {
  content: '';
  display: block;
  width: 0;
  height: 2px;
  margin-top: 0.5rem;
  background: linear-gradient(90deg, var(--gold), transparent);
  transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 0 10px rgba(201, 169, 110, 0.3);
}

.chapter.visible h3::after {
  width: 60%;
}

.chapter h4 {
  font-family: var(--font-heading);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--gold);
  margin: 2rem 0 0.6rem;
}

.chapter p {
  margin-bottom: 1.2rem;
  font-weight: 300;
  overflow-wrap: break-word;
  hyphens: auto;
  -webkit-hyphens: auto;
}

.chapter p strong {
  font-weight: 600;
  color: var(--text-bright);
}

.chapter p em {
  color: var(--gold);
  font-style: italic;
}

/* Drop cap for opening paragraph of each chapter */
.chapter > p:first-of-type::first-letter {
  font-family: var(--font-heading);
  font-size: 3.4em;
  float: left;
  line-height: 0.8;
  margin: 0.05em 0.12em 0 0;
  color: var(--gold-bright);
  text-shadow: 0 0 20px rgba(201, 169, 110, 0.3);
}

.chapter blockquote {
  border-left: 3px solid var(--gold-dim);
  margin: 1.5rem 0;
  padding: 0.8rem 1.5rem;
  background: var(--sacred);
  border-radius: 0 6px 6px 0;
  font-style: italic;
  color: var(--text-dim);
  transition: border-color 0.3s, background 0.3s;
}

.chapter blockquote:hover {
  border-left-color: var(--gold);
  background: rgba(201, 169, 110, 0.06);
}

.chapter blockquote p { margin-bottom: 0.5rem; }
.chapter blockquote p:last-child { margin-bottom: 0; }

.chapter ul, .chapter ol { margin: 1rem 0 1.2rem; padding-left: 1.5rem; }
.chapter li { margin-bottom: 0.4rem; font-weight: 300; }
.chapter li strong { font-weight: 600; color: var(--text-bright); }

.chapter hr {
  border: none; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 2.5rem 0;
}

/* CODE — Glowing incantations */
.chapter code {
  font-family: var(--font-code);
  font-size: 0.82em;
  background: var(--bg-code);
  color: var(--gold);
  padding: 0.15em 0.4em;
  border-radius: 3px;
  border: 1px solid var(--border-subtle);
  word-break: break-all;
}

.chapter pre {
  margin: 1.5rem 0;
  padding: 1.2rem 1.5rem;
  background: var(--bg-code);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow-x: auto;
  position: relative;
  transition: border-color 0.3s, box-shadow 0.3s;
  max-width: 100%;
}

.chapter pre:hover {
  border-color: var(--gold-dim);
  box-shadow: 0 0 30px rgba(201, 169, 110, 0.06), inset 0 0 30px rgba(201, 169, 110, 0.02);
}

.chapter pre code {
  background: none; border: none; padding: 0;
  font-size: 0.8rem; line-height: 1.6;
  color: var(--text); white-space: pre; display: block;
  font-variant-ligatures: none; tab-size: 4;
}

/* Copy button on code blocks */
.code-copy {
  position: absolute;
  top: 0.6rem; right: 0.6rem;
  background: rgba(201, 169, 110, 0.1);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-code);
  font-size: 0.65rem;
  padding: 0.25rem 0.6rem;
  border-radius: 4px;
  cursor: pointer;
  opacity: 0;
  transition: all 0.2s;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.chapter pre:hover .code-copy { opacity: 1; }
.code-copy:hover { background: rgba(201, 169, 110, 0.2); color: var(--gold); border-color: var(--gold-dim); }
.code-copy.copied { color: var(--gold-bright); border-color: var(--gold); }

/* Links */
.chapter a {
  color: var(--gold);
  text-decoration: none;
  background-image: linear-gradient(var(--gold-dim), var(--gold-dim));
  background-size: 100% 1px;
  background-position: 0 100%;
  background-repeat: no-repeat;
  transition: background-size 0.3s, color 0.2s;
}

.chapter a:hover {
  color: var(--gold-bright);
  background-image: linear-gradient(var(--gold), var(--gold));
  background-size: 100% 2px;
}

/* ═══════════════════════════════════════════════
   CHAPTER MARKER — Adinkra with glow
   ═══════════════════════════════════════════════ */
.chapter-marker {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 0.8rem;
}

.chapter-marker svg {
  width: 30px; height: 30px;
  opacity: 0.4;
  filter: drop-shadow(0 0 6px rgba(201, 169, 110, 0.3));
  transition: all 0.4s;
}

.chapter.visible .chapter-marker svg {
  opacity: 0.7;
  animation: markerPulse 3s ease-in-out infinite;
}

@keyframes markerPulse {
  0%, 100% { filter: drop-shadow(0 0 6px rgba(201, 169, 110, 0.2)); }
  50% { filter: drop-shadow(0 0 14px rgba(201, 169, 110, 0.5)); }
}

/* ═══════════════════════════════════════════════
   MOBILE
   ═══════════════════════════════════════════════ */
#mobile-toggle {
  display: none;
  position: fixed;
  top: 0.8rem; left: 0.8rem;
  z-index: 200;
  width: 42px; height: 42px;
  border: 1px solid var(--border);
  background: rgba(6,6,14,0.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--gold);
  font-size: 1.1rem;
  cursor: pointer;
  border-radius: 8px;
  align-items: center;
  justify-content: center;
  transition: all 0.25s;
}

#mobile-toggle:hover { border-color: var(--gold-dim); background: rgba(201,169,110,0.1); }
#mobile-toggle:active { transform: scale(0.92); }

#sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 90;
  opacity: 0;
  transition: opacity 0.35s;
}
#sidebar-overlay.open { display: block; opacity: 1; }

/* Back to top */
#back-to-top {
  position: fixed;
  bottom: 2rem; right: 2rem;
  width: 44px; height: 44px;
  border: 1px solid var(--border);
  background: rgba(6,6,14,0.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--gold-dim);
  font-size: 1.1rem;
  cursor: pointer;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: translateY(10px) scale(0.9);
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 50;
}

#back-to-top.show { opacity: 1; transform: translateY(0) scale(1); }
#back-to-top:hover { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 20px rgba(201,169,110,0.15); }
#back-to-top:active { transform: scale(0.9); }

/* ═══════════════════════════════════════════════
   KEYBOARD HINTS
   ═══════════════════════════════════════════════ */
#keyboard-hint {
  position: fixed;
  bottom: 1rem; left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-code);
  font-size: 0.65rem;
  color: var(--text-dim);
  background: rgba(6,6,14,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 0.35rem 0.9rem;
  border: 1px solid var(--border);
  border-radius: 20px;
  opacity: 0;
  transition: opacity 0.5s;
  z-index: 50;
  pointer-events: none;
  letter-spacing: 0.04em;
}

#keyboard-hint.show { opacity: 0.7; }

/* ═══════════════════════════════════════════════
   THEME & TYPOGRAPHY CONTROLS
   ═══════════════════════════════════════════════ */
body, #sidebar, #content, #hero, .chapter, .chapter pre, .chapter blockquote {
  transition: background-color 0.5s ease, color 0.3s ease, border-color 0.3s ease;
}
body { font-size: var(--font-size, 19px); line-height: var(--line-height, 1.85); }

#sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  margin: 0 1.3rem 0.4rem;
}
.sidebar-tab {
  flex: 1;
  padding: 0.45rem 0;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-dim);
  font-family: var(--font-code);
  font-size: 0.58rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.sidebar-tab:hover { color: var(--text); }
.sidebar-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

#sidebar-controls {
  display: flex;
  gap: 0.4rem;
  padding: 0.5rem 1.3rem;
}
.sidebar-ctrl-btn {
  padding: 0.3rem 0.55rem;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border-subtle);
  border-radius: 5px;
  color: var(--text-dim);
  font-family: var(--font-code);
  font-size: 0.58rem;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.04em;
}
.sidebar-ctrl-btn:hover { border-color: var(--border); color: var(--text); }
.sidebar-ctrl-btn.active { color: var(--gold); border-color: rgba(201,169,110,0.25); background: rgba(201,169,110,0.06); }

#theme-panel, #typo-panel { display: none; padding: 0.6rem 1.3rem; border-bottom: 1px solid var(--border-subtle); }
#theme-panel.open, #typo-panel.open { display: block; }

.theme-swatches { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
.theme-swatch {
  width: 30px; height: 30px;
  border-radius: 7px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.25s;
}
.theme-swatch:hover { transform: scale(1.1); }
.theme-swatch.active { border-color: var(--gold); box-shadow: 0 0 12px rgba(201,169,110,0.3); }
.theme-swatch[data-theme="midnight"] { background: #0a0a14; border-color: #1e1e30; }
.theme-swatch[data-theme="parchment"] { background: #faf7f0; }
.theme-swatch[data-theme="sepia"] { background: #f5edd8; }
.theme-swatch[data-theme="dawn"] { background: #201a2a; border-color: #352a45; }
.theme-swatch.active[data-theme="midnight"] { border-color: #c9a96e; }

.theme-label {
  font-family: var(--font-code);
  font-size: 0.52rem;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.4rem;
}

.typo-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
.typo-label {
  font-family: var(--font-code);
  font-size: 0.52rem;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  min-width: 48px;
}
.typo-slider {
  flex: 1;
  -webkit-appearance: none; appearance: none;
  height: 3px; background: var(--border);
  border-radius: 2px; outline: none;
}
.typo-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  background: var(--gold-dim);
  border-radius: 50%;
  cursor: pointer;
}
.typo-slider::-moz-range-thumb {
  width: 14px; height: 14px;
  background: var(--gold-dim);
  border-radius: 50%;
  cursor: pointer; border: none;
}
.typo-value {
  font-family: var(--font-code);
  font-size: 0.58rem;
  color: var(--text-dim);
  min-width: 26px;
  text-align: right;
}

/* ═══════════════════════════════════════════════
   BOOKMARKS & HIGHLIGHTS
   ═══════════════════════════════════════════════ */
.bookmark-btn {
  float: right;
  background: none; border: none;
  cursor: pointer; color: var(--text-dim);
  font-size: 1rem; opacity: 0.25;
  transition: all 0.25s; padding: 0.2rem;
}
.bookmark-btn:hover { opacity: 0.7; color: var(--gold); }
.bookmark-btn.active { opacity: 1; color: var(--gold); }

.nav-bookmark-dot {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold);
  margin-left: 0.3rem;
  vertical-align: middle;
}

.text-highlight {
  border-radius: 2px; padding: 0 1px;
  cursor: pointer; transition: filter 0.2s;
}
.text-highlight:hover { filter: brightness(1.3); }
.text-highlight[data-color="gold"] { background: rgba(201,169,110,0.25); }
.text-highlight[data-color="coral"] { background: rgba(205,92,92,0.25); }
.text-highlight[data-color="teal"] { background: rgba(72,166,166,0.25); }
.text-highlight[data-color="lavender"] { background: rgba(148,120,196,0.25); }

#highlight-toolbar {
  position: absolute; display: none; z-index: 200;
  padding: 0.4rem 0.5rem;
  background: rgba(14,14,28,0.95);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  gap: 0.3rem; align-items: center;
}
#highlight-toolbar.show { display: flex; }
.hl-color-btn {
  width: 22px; height: 22px;
  border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; transition: all 0.2s;
}
.hl-color-btn:hover { transform: scale(1.2); border-color: rgba(255,255,255,0.3); }
.hl-color-btn[data-color="gold"] { background: #c9a96e; }
.hl-color-btn[data-color="coral"] { background: #cd5c5c; }
.hl-color-btn[data-color="teal"] { background: #48a6a6; }
.hl-color-btn[data-color="lavender"] { background: #9478c4; }

/* ═══════════════════════════════════════════════
   STUDY PANEL
   ═══════════════════════════════════════════════ */
#study-panel-content { display: none; padding: 0 1.3rem 1rem; }
#study-panel-content.open { display: block; }
.study-section-title {
  font-family: var(--font-code);
  font-size: 0.55rem; color: var(--gold-dim);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin: 0.8rem 0 0.3rem;
}
.study-item {
  padding: 0.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.03);

}
.study-item:hover { color: var(--text); }
.study-color-dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; vertical-align: middle; margin-right: 0.3rem;
}
.study-export-btn {
  display: block; width: 100%; margin-top: 0.8rem;
  padding: 0.5rem; background: rgba(201,169,110,0.06);
  border: 1px solid rgba(201,169,110,0.15); border-radius: 6px;
  color: var(--gold-dim); font-family: var(--font-code);
  font-size: 0.58rem; letter-spacing: 0.06em;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.study-export-btn:hover { background: rgba(201,169,110,0.12); color: var(--gold); }

/* ═══════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════ */
@media (max-width: 960px) {
  :root { --sidebar-w: 280px; --content-max: 100%; }

  #sidebar.open { transform: translateX(0); box-shadow: 4px 0 30px rgba(0,0,0,0.6); }
  #mobile-toggle { display: flex; }
  #content { grid-column: 1; padding: 2.5rem 1.2rem 5rem; }
  #chapter-indicator { display: none; }
  #keyboard-hint { display: none; }
  body { font-size: 17px; }
  .chapter h3 { font-size: 1.45rem; }
  .chapter h2 { font-size: 1.3rem; }
  .chapter > p:first-of-type::first-letter { font-size: 2.6em; }
  .chapter pre { margin-left: -0.4rem; margin-right: -0.4rem; border-radius: 6px; padding: 1rem; }
  .chapter pre code { font-size: 0.72rem; }
}

@media (max-width: 480px) {
  body { font-size: 16px; line-height: 1.75; }
  #hero h1 { font-size: 1.8rem; }
  #hero .subtitle { font-size: 0.95rem; }
  #hero .manner { font-size: 0.85rem; margin-bottom: 2rem; }
  .enter-scroll { padding: 0.7rem 2rem; font-size: 0.95rem; }
  #content { padding: 2rem 1rem 4rem; }
  .chapter h3 { font-size: 1.3rem; }
  .chapter h2 { font-size: 1.15rem; }
  .chapter pre { padding: 0.7rem 0.8rem; margin-left: -0.5rem; margin-right: -0.5rem; }
  .chapter pre code { font-size: 0.65rem; line-height: 1.5; }
  .chapter > p:first-of-type::first-letter { font-size: 2.2em; }
  .chapter blockquote { padding: 0.6rem 1rem; margin-left: 0; margin-right: 0; }
  .sacred-divider { padding: 1.5rem 0; }
  .sacred-divider .symbol svg { width: 24px; height: 24px; }
  #back-to-top { bottom: 1rem; right: 1rem; width: 38px; height: 38px; font-size: 0.95rem; }
  #mobile-toggle { top: 0.6rem; left: 0.6rem; width: 38px; height: 38px; }
}

/* ═══════════════════════════════════════════════
   DEMO PANELS — Live Wasm embedded in chapters
   ═══════════════════════════════════════════════ */
.demo-panel {
  margin: 2rem 0;
  padding: 1.2rem;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 10px;
  position: relative;
  overflow: hidden;
}

.demo-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright), var(--gold-dim));
  opacity: 0.6;
}

.demo-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.8rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid var(--border-subtle);
}

.demo-title {
  font-family: var(--font-heading);
  font-size: 0.95rem;
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 0.04em;
}

.demo-badge {
  font-family: var(--font-code);
  font-size: 0.6rem;
  color: var(--gold-bright);
  background: rgba(201, 169, 110, 0.15);
  padding: 0.2rem 0.5rem;
  border-radius: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  animation: badgePulse 2s ease-in-out infinite;
}

@keyframes badgePulse {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

.demo-canvas-wrap {
  position: relative;
  width: 100%;
  margin-bottom: 0.6rem;
}

.demo-canvas-wrap canvas {
  width: 100%;
  display: block;
  border-radius: 6px;
  border: 1px solid var(--border-subtle);
  background: var(--bg-deep);
}

.demo-controls {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-bottom: 0.5rem;
}

.demo-btn {
  background: rgba(201, 169, 110, 0.08);
  border: 1px solid var(--border);
  color: var(--gold);
  font-family: var(--font-code);
  font-size: 0.7rem;
  padding: 0.35rem 0.75rem;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.03em;
}

.demo-btn:hover { background: rgba(201, 169, 110, 0.18); border-color: var(--gold-dim); }
.demo-btn:active { transform: scale(0.95); }
.demo-btn.active { background: var(--gold-dim); color: var(--bg-deep); border-color: var(--gold); font-weight: 500; }
.demo-btn.primary { background: rgba(201, 169, 110, 0.15); border-color: var(--gold-dim); }

.demo-stats {
  font-family: var(--font-code);
  font-size: 0.68rem;
  color: var(--text-dim);
  line-height: 1.6;
}

.demo-stats span { color: var(--gold); }

/* Stack machine specific */
.stack-vm-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.8rem;
  margin-bottom: 0.6rem;
}

.stack-vm-panel {
  background: var(--bg-code);
  border: 1px solid var(--border-subtle);
  border-radius: 6px;
  padding: 0.6rem;
  min-height: 120px;
}

.stack-vm-panel h4 {
  font-family: var(--font-code);
  font-size: 0.65rem;
  color: var(--gold-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.4rem;
}

.stack-vm-panel .values {
  font-family: var(--font-code);
  font-size: 0.75rem;
  line-height: 1.5;
  color: var(--text);
}

.stack-val {
  display: inline-block;
  background: rgba(201, 169, 110, 0.12);
  border: 1px solid var(--border);
  padding: 0.15rem 0.4rem;
  border-radius: 3px;
  margin: 0.1rem;
  transition: all 0.2s;
}

.stack-val.new { background: rgba(201, 169, 110, 0.3); border-color: var(--gold); }

.program-line {
  font-family: var(--font-code);
  font-size: 0.7rem;
  padding: 0.1rem 0.3rem;
  color: var(--text-dim);
  border-radius: 2px;
  transition: all 0.15s;
}

.program-line.active {
  background: rgba(201, 169, 110, 0.2);

.demo-output {
  font-family: var(--font-code);

}

.demo-error {

.demo-loading {

}

@media (max-width: 960px) {

@media (max-width: 480px) {

/* ═══════════════════════════════════════════════
   LOADING
   ═══════════════════════════════════════════════ */
#loading {
  display: flex; align-items: center; justify-content: center;

  color: var(--text-dim);
  font-family: var(--font-heading);
  font-size: 1.1rem;
}

.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border);

  border-radius: 50%;

  margin-right: 1rem;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════════════
   PRINT
   ═══════════════════════════════════════════════ */
@media print {
  #sidebar, #mobile-toggle, #back-to-top, #hero, #particles-canvas,
  #top-progress, #chapter-indicator, #keyboard-hint,
  .sacred-divider, .chapter-marker, .code-copy, .demo-panel { display: none !important; }

}

<script>
/* ═══════════════════════════════════════════════
   GLOBALS
   ═══════════════════════════════════════════════ */
let chapters = [];
let currentChapterIdx = 0;
let mouseX = 0, mouseY = 0;

document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
});

/* ═══════════════════════════════════════════════
   HERO — Interactive particle field
   Mouse-reactive sacred geometry
   ═══════════════════════════════════════════════ */
(function initHero() {
  const canvas = document.getElementById('hero-canvas');
  const ctx = canvas.getContext('2d');
  let w, h, stopped = false;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Particle field
  const particles = [];
  const PARTICLE_COUNT = 80;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x: Math.random() * 2000,
      y: Math.random() * 2000,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.8 + 0.5,
      alpha: Math.random() * 0.4 + 0.1,
      pulse: Math.random() * Math.PI * 2,
    });
  }

  function drawCircle(cx, cy, r, alpha) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(201, 169, 110, ${alpha})`;
    ctx.lineWidth = 0.7;
    ctx.stroke();
  }

  function drawFlowerOfLife(cx, cy, r, alpha, rot) {
    drawCircle(cx, cy, r, alpha);
    for (let i = 0; i < 6; i++) {
      const a = (i * Math.PI / 3) + rot;
      const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
      drawCircle(x, y, r, alpha);
      // Second ring
      for (let j = -1; j <= 1; j += 2) {
        const a2 = a + j * Math.PI / 3;
        drawCircle(x + r * Math.cos(a2), y + r * Math.sin(a2), r, alpha * 0.5);
      }
    }
  }

  function drawMetatron(cx, cy, r, alpha, rot) {
    const pts = [[cx, cy]];
    for (let ring = 1; ring <= 2; ring++) {
      for (let i = 0; i < 6; i++) {
        const a = (i * Math.PI / 3) + rot;
        pts.push([cx + r * ring * Math.cos(a), cy + r * ring * Math.sin(a)]);
      }
    }
    ctx.strokeStyle = `rgba(201, 169, 110, ${alpha * 0.25})`;
    ctx.lineWidth = 0.35;
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        ctx.beginPath();
        ctx.moveTo(pts[i][0], pts[i][1]);
        ctx.lineTo(pts[j][0], pts[j][1]);
        ctx.stroke();
      }
    }
    pts.forEach(([x, y]) => {
      ctx.beginPath();
      ctx.arc(x, y, 1.8, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201, 169, 110, ${alpha * 0.5})`;
      ctx.fill();
    });
  }

  function drawFractal(cx, cy, size, depth, alpha, rot) {
    if (depth <= 0 || size < 3) return;
    const pts = [];
    for (let i = 0; i < 3; i++) {
      const a = (i * 2 * Math.PI / 3) - Math.PI / 2 + rot;
      pts.push([cx + size * Math.cos(a), cy + size * Math.sin(a)]);
    }
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    pts.forEach(p => ctx.lineTo(p[0], p[1]));
    ctx.closePath();
    ctx.strokeStyle = `rgba(201, 169, 110, ${alpha})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
    for (let i = 0; i < 3; i++) {
      const mx = (pts[i][0] + pts[(i + 1) % 3][0]) / 2;
      const my = (pts[i][1] + pts[(i + 1) % 3][1]) / 2;
      drawFractal(mx, my, size * 0.45, depth - 1, alpha * 0.65, rot + 0.1);
    }
  }

  let frame = 0;
  function animate() {
    if (stopped) return;
    frame++;
    ctx.clearRect(0, 0, w, h);
    const t = frame * 0.004;
    const cx = w / 2, cy = h / 2;
    const r = Math.min(w, h) * 0.075;

    // Mouse influence on geometry
    const mdx = (mouseX - cx) / w;
    const mdy = (mouseY - cy) / h;
    const gx = cx + mdx * 30;
    const gy = cy + mdy * 30;

    // Breathing glow behind geometry
    const breathe = 0.5 + 0.5 * Math.sin(t * 0.8);
    const glowR = r * 3.5;
    const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, glowR);
    grad.addColorStop(0, `rgba(201, 169, 110, ${0.04 + breathe * 0.03})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(gx - glowR, gy - glowR, glowR * 2, glowR * 2);

    // Central sacred geometry (reacts to mouse)
    drawFlowerOfLife(gx, gy, r, 0.14, t * 0.15);
    drawMetatron(gx, gy, r * 0.85, 0.1, -t * 0.12 + mdx * 0.3);

    // Corner fractals
    const cs = Math.min(w, h) * 0.11;
    drawFractal(w * 0.1, h * 0.12, cs, 3, 0.055, t * 0.08);
    drawFractal(w * 0.9, h * 0.12, cs, 3, 0.055, -t * 0.08);
    drawFractal(w * 0.1, h * 0.88, cs, 3, 0.055, -t * 0.06);
    drawFractal(w * 0.9, h * 0.88, cs, 3, 0.055, t * 0.06);

    // Particles
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.pulse += 0.02;
      if (p.x < 0) p.x = w;
      if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h;
      if (p.y > h) p.y = 0;

      // Mouse attraction
      const dx = mouseX - p.x, dy = mouseY - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 200 && dist > 0) {
        const force = 0.02 * (1 - dist / 200);
        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force;
      }
      // Damping
      p.vx *= 0.99;
      p.vy *= 0.99;

      const a = p.alpha * (0.7 + 0.3 * Math.sin(p.pulse));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201, 169, 110, ${a})`;
      ctx.fill();
    });

    // Connection lines between nearby particles
    ctx.lineWidth = 0.3;
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d = dx * dx + dy * dy;
        if (d < 12000) {
          const a = 0.06 * (1 - d / 12000);
          ctx.strokeStyle = `rgba(201, 169, 110, ${a})`;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }

    // Orbiting points
    for (let i = 0; i < 16; i++) {
      const a = (i * Math.PI / 8) + t * 0.35;
      const orbitR = r * 2.6 + Math.sin(t * 1.2 + i * 0.7) * 20;
      const x = gx + orbitR * Math.cos(a);
      const y = gy + orbitR * Math.sin(a);
      ctx.beginPath();
      ctx.arc(x, y, 1.2 + Math.sin(t + i) * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201, 169, 110, ${0.15 + 0.1 * Math.sin(t * 2 + i)})`;
      ctx.fill();
    }

    requestAnimationFrame(animate);
  }
  animate();

  // Button mouse tracking for radial highlight
  const btn = document.getElementById('enter-btn');
  btn.addEventListener('mousemove', e => {
    const r = btn.getBoundingClientRect();
    btn.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');
    btn.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100) + '%');
  });

  window._stopHero = () => { stopped = true; };
})();

/* ═══════════════════════════════════════════════
   PARSER
   ═══════════════════════════════════════════════ */
function parseTreatise(md) {
  const lines = md.split('\n');
  const chs = [];
  let cur = null, part = '';

  for (const line of lines) {
    if (/^## Part \w+:/.test(line)) part = line.replace(/^## /, '');
    if (/^### Letter \d+/.test(line) || /^## Preface/.test(line) || /^## Epilogue/.test(line)) {
      if (cur) chs.push(cur);
      const title = line.replace(/^#{2,3}\s+/, '');
      const id = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
      cur = { title, id, part, lines: [line] };
    } else if (cur) {
      cur.lines.push(line);
    }
  }
  if (cur) chs.push(cur);
  return chs;
}

/* ═══════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════ */
function buildNavigation(chs) {
  const tree = document.getElementById('nav-tree');
  const parts = new Map();

  chs.forEach((ch, i) => {
    const key = ch.part || 'Introduction';
    if (!parts.has(key)) parts.set(key, []);
    parts.get(key).push({ ...ch, index: i });
  });

  let html = '';
  let pi = 0;
  parts.forEach((letters, name) => {
    html += `<div class="nav-part" data-part="${pi}">
      <div class="nav-part-title" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="chevron">&#9660;</span>
        <span>${name === 'Introduction' ? 'Preface' : name}</span>
      </div>
      <div class="nav-letters">`;
    letters.forEach(ch => {
      const short = ch.title.length > 42 ? ch.title.substring(0, 40) + '\u2026' : ch.title;
      html += `<a class="nav-letter" data-target="${ch.id}" data-index="${ch.index}" onclick="scrollToChapter('${ch.id}')">${short}</a>`;
    });
    html += `</div></div>`;
    pi++;
  });

  tree.innerHTML = html;
}

/* ═══════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════ */
function renderChapters(chs) {
  const content = document.getElementById('content');
  marked.setOptions({ breaks: false, gfm: true });

  let html = '';
  chs.forEach((ch, i) => {
    let rendered = marked.parse(ch.lines.join('\n'));
    // Detect demo markers: <!-- DEMO:xxx -->
    rendered = rendered.replace(/&lt;!--\s*DEMO:([\w-]+)\s*--&gt;/g, (_, demoId) => {
      const titles = {
        'sorting-theater': 'Sorting Theater — TAOCP Vol. 3 Made Alive',
        'stack-machine': 'Stack Machine — Knuth\'s MIX Reborn',
      };
      return `<div class="demo-panel" data-demo="${demoId}" id="demo-${demoId}">
        <div class="demo-header">
          <span class="demo-title">${titles[demoId] || demoId}</span>
          <span class="demo-badge">live wasm</span>
        </div>
        <div class="demo-content"><div class="demo-loading"><div class="spinner"></div>Loading Wasm module\u2026</div></div>
      </div>`;
    });

    html += `<article class="chapter" id="${ch.id}" data-index="${i}">
      <div class="chapter-marker">${getAdinkraSVG(i)}</div>
      ${rendered}
    </article>`;
    if (i < chs.length - 1) html += makeSacredDivider(i);
  });

  content.innerHTML = html;

  // Add copy buttons to code blocks
  content.querySelectorAll('pre').forEach(pre => {
    const btn = document.createElement('button');
    btn.className = 'code-copy';
    btn.textContent = 'copy';
    btn.onclick = () => {
      const code = pre.querySelector('code');
      if (code) {
        navigator.clipboard.writeText(code.textContent).then(() => {
          btn.textContent = 'copied';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
        });
      }
    };
    pre.appendChild(btn);
  });
}

/* ═══════════════════════════════════════════════
   SCROLLSPY + REVEAL
   ═══════════════════════════════════════════════ */
function initObservers() {
  // Scrollspy
  const spy = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        const idx = parseInt(entry.target.dataset.index);
        currentChapterIdx = idx;

        document.querySelectorAll('.nav-letter').forEach(el => el.classList.remove('active'));
        const navItem = document.querySelector(`.nav-letter[data-target="${id}"]`);
        if (navItem) {
          navItem.classList.add('active');
          navItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
          const part = navItem.closest('.nav-part');
          if (part) part.classList.remove('collapsed');
        }

        // Update chapter indicator
        const indicator = document.getElementById('chapter-indicator');
        const ch = chapters[idx];
        if (ch) {
          const short = ch.title.length > 50 ? ch.title.substring(0, 48) + '\u2026' : ch.title;
          indicator.textContent = `${idx + 1} / ${chapters.length} \u2014 ${short}`;
        }

        // Persist reading progress for library hub
        saveReadingProgress(idx + 1, chapters.length);
      }
    });
  }, { rootMargin: '-15% 0px -65% 0px' });

  // Reveal on scroll
  const reveal = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        reveal.unobserve(entry.target); // Only animate once
      }
    });
  }, { rootMargin: '0px 0px -60px 0px', threshold: 0.02 });

  document.querySelectorAll('.chapter').forEach(el => {
    spy.observe(el);
    reveal.observe(el);
  });
}

/* ═══════════════════════════════════════════════
   PROGRESS + BACK TO TOP
   ═══════════════════════════════════════════════ */
function initProgress() {
  const bar = document.getElementById('reading-progress-bar');
  const topBar = document.getElementById('top-progress');
  const btn = document.getElementById('back-to-top');
  const indicator = document.getElementById('chapter-indicator');
  const kbHint = document.getElementById('keyboard-hint');
  let hideTimer;

  function update() {
    const st = window.scrollY;
    const dh = document.documentElement.scrollHeight - window.innerHeight;
    const pct = dh > 0 ? (st / dh) * 100 : 0;
    bar.style.width = pct + '%';
    topBar.style.width = pct + '%';

    if (st > 400) {
      btn.classList.add('show');
      indicator.classList.add('show');
    } else {
      btn.classList.remove('show');
      indicator.classList.remove('show');
    }

    // Show keyboard hint briefly on first scroll
    if (st > 100 && st < 600) {
      kbHint.classList.add('show');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => kbHint.classList.remove('show'), 4000);
    }
  }

  window.addEventListener('scroll', update, { passive: true });
  update();
}

function enterScroll() {
  const hero = document.getElementById('hero');
  const app = document.getElementById('app');

  hero.classList.add('exiting');
  app.style.display = 'grid';

  // Wait for hero exit animation
  setTimeout(() => {
    hero.classList.add('hidden');
    app.classList.add('visible');
    window.scrollTo(0, 0);
    window._startReadingParticles();
    window._stopHero();
  }, 600);
}

function scrollToChapter(id) {
  const el = document.getElementById(id);
  if (el) {
    const offset = 20;
    const y = el.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top: y, behavior: 'smooth' });
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

/* ═══════════════════════════════════════════════
   KEYBOARD NAVIGATION
   ═══════════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
  // Don't intercept when typing in inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const hero = document.getElementById('hero');
  if (!hero.classList.contains('hidden')) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); enterScroll(); }
    return;
  }

  switch (e.key) {
    case 'j': // Next chapter
      e.preventDefault();
      if (currentChapterIdx < chapters.length - 1) {
        scrollToChapter(chapters[currentChapterIdx + 1].id);
      }
      break;
    case 'k': // Prev chapter
      e.preventDefault();
      if (currentChapterIdx > 0) {
        scrollToChapter(chapters[currentChapterIdx - 1].id);
      }
      break;
    case 't': // Top
      e.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      break;
    case 's': // Toggle sidebar
      e.preventDefault();
      toggleSidebar();
      break;
    case 'Escape':
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('open');
      break;
  }
});

/* ═══════════════════════════════════════════════
   WASM DEMOS — Lazy-loaded interactive panels
   ═══════════════════════════════════════════════ */
function initDemos() {
  const observer = new IntersectionObserver(async (entries) => {
    for (const entry of entries) {
      if (entry.isIntersecting && !entry.target.dataset.initialized) {
        entry.target.dataset.initialized = 'true';
        const demoId = entry.target.dataset.demo;
        try {
          if (demoId === 'sorting-theater') await initSortingDemo(entry.target);
          else if (demoId === 'stack-machine') await initStackDemo(entry.target);
        } catch (err) {
          entry.target.querySelector('.demo-content').innerHTML =
            `<div class="demo-error">Failed to load demo: ${err.message}</div>`;
        }
      }
    }
  }, { rootMargin: '400px' });

  document.querySelectorAll('.demo-panel').forEach(el => observer.observe(el));
}

    <div class="demo-canvas-wrap"><canvas id="sorting-canvas" height="200"></canvas></div>
    <div class="demo-controls" id="sorting-algos"></div>
    <div class="demo-controls" id="sorting-actions"></div>
    <div class="demo-stats" id="sorting-stats"></div>
  `;

  const canvas = document.getElementById('sorting-canvas');
  const ctx = canvas.getContext('2d');

  // Algorithm buttons
  const algos = ['Bubble', 'Insertion', 'Selection', 'Quicksort', 'Heapsort', 'Merge'];
  const algoBtns = document.getElementById('sorting-algos');
  algos.forEach((name, idx) => {
    const btn = document.createElement('button');
    btn.className = 'demo-btn' + (idx === 0 ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => {
      playing = false;
      theater.set_algorithm(idx);
      algoBtns.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      draw();
      updateStats();
    };
    algoBtns.appendChild(btn);
  });

  // Action buttons
  const actions = document.getElementById('sorting-actions');
  const mkBtn = (text, cls, fn) => {
    const b = document.createElement('button');
    b.className = 'demo-btn ' + cls;
    b.textContent = text;
    b.onclick = fn;
    actions.appendChild(b);
    return b;
  };

  const playBtn = mkBtn('\u25B6 Play', 'primary', () => {
    if (theater.is_done()) { theater.reset(); }
    playing = !playing;
    playBtn.textContent = playing ? '\u23F8 Pause' : '\u25B6 Play';
    if (playing) animate();
  });

  mkBtn('Step', '', () => {
    playing = false;
    playBtn.textContent = '\u25B6 Play';
    theater.step();
    draw();
    updateStats();
  });

  mkBtn('Reset', '', () => {
    playing = false;
    playBtn.textContent = '\u25B6 Play';
    theater.reset();
    draw();
    updateStats();
  });

  mkBtn('Shuffle', '', () => {
    playing = false;
    playBtn.textContent = '\u25B6 Play';
    theater.randomize();
    draw();
    updateStats();
  });

  mkBtn('Faster', '', () => { speed = Math.min(speed * 2, 64); });
  mkBtn('Slower', '', () => { speed = Math.max(Math.floor(speed / 2), 1); });

  function draw() {
    const w = canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1);
    const h = canvas.height = 200 * (window.devicePixelRatio || 1);
    ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
    const cw = canvas.clientWidth, ch = 200;

    ctx.clearRect(0, 0, cw, ch);

    const ptr = theater.data_ptr();
    const data = new Uint32Array(wasm.memory.buffer, ptr, SIZE);
    const ha = theater.highlight_a();
    const hb = theater.highlight_b();
    const barW = Math.max(1, (cw - SIZE) / SIZE);
    const gap = 1;
    const maxVal = SIZE;

    for (let i = 0; i < SIZE; i++) {
      const val = data[i];
      const barH = (val / maxVal) * (ch - 10);
      const x = i * (barW + gap) + gap;
      const y = ch - barH;

      if (i === ha || i === hb) {
        ctx.fillStyle = '#e4c98a';
        ctx.shadowColor = 'rgba(201, 169, 110, 0.5)';
        ctx.shadowBlur = 8;
      } else if (theater.is_done()) {
        ctx.fillStyle = '#4a7a5a';
        ctx.shadowBlur = 0;
      } else {
        ctx.fillStyle = '#5a5a6e';
        ctx.shadowBlur = 0;
      }

      ctx.fillRect(x, y, barW, barH);
      ctx.shadowBlur = 0;
    }
  }

  function updateStats() {
    document.getElementById('sorting-stats').innerHTML =
      `<span>${theater.algorithm_name()}</span> &mdash; ` +
      `Comparisons: <span>${theater.comparisons()}</span> &middot; ` +
      `Swaps: <span>${theater.swaps()}</span>` +
      (theater.is_done() ? ' &middot; <span>Done!</span>' : '') +
      ` &middot; Speed: <span>${speed}x</span>`;
  }

  function animate() {
    if (!playing) return;
    const alive = theater.step_n(speed);
    draw();
    updateStats();
    if (!alive) {
      playing = false;
      playBtn.textContent = '\u25B6 Play';
      draw();
      updateStats();
      return;
    }
    animId = requestAnimationFrame(animate);
  }

  draw();
  updateStats();
}

/* ── Stack Machine ───────────────────────────── */
async function initStackDemo(panel) {
  const { default: init, StackMachine } = await import('./pkg/stack-machine/stack_machine.js');
  const wasm = await init('./pkg/stack-machine/stack_machine_bg.wasm');

  const vm = new StackMachine();
  let playing = false;
  let animId = null;

  const programs = {
    'Arithmetic: (3+4)×2': 'PUSH 3\nPUSH 4\nADD\nPUSH 2\nMUL\nOUTPUT\nHALT',
    'Fibonacci (first 10)': [
      '# Fibonacci: compute first 10 numbers',
      '# mem[0] = a, mem[1] = b, mem[2] = counter',
      'PUSH 0\nPUSH 0\nSTORE',   // a = 0
      'PUSH 1\nPUSH 1\nSTORE',   // b = 1
      'PUSH 2\nPUSH 10\nSTORE',  // counter = 10
      '# output a',
      'PUSH 0\nLOAD\nOUTPUT',
      '# temp = a + b',
      'PUSH 0\nLOAD',
      'PUSH 1\nLOAD',
      'ADD',
      '# a = b',
      'PUSH 1\nLOAD',
      'PUSH 0\nSWAP\nSTORE',
      '# b = temp (still on stack)',
      'PUSH 1\nSWAP\nSTORE',
      '# counter--',
      'PUSH 2\nLOAD\nPUSH 1\nSUB',
      'DUP\nPUSH 2\nSWAP\nSTORE',
      '# if counter > 0, loop',
      'JNZ 27',
      'HALT',
    ].join('\n'),
    'Countdown (10 to 1)': 'PUSH 10\nDUP\nOUTPUT\nPUSH 1\nSUB\nDUP\nJNZ 1\nDROP\nHALT',
  };

  const content = panel.querySelector('.demo-content');
  content.innerHTML = `
    <div class="demo-controls" id="stack-programs"></div>
    <div class="stack-vm-grid">
      <div class="stack-vm-panel"><h4>Program</h4><div class="values" id="stack-program"></div></div>
      <div class="stack-vm-panel"><h4>Stack</h4><div class="values" id="stack-values"></div></div>
    </div>
    <div class="demo-output" id="stack-output"></div>
    <div class="demo-error" id="stack-error"></div>
    <div class="demo-controls" id="stack-actions"></div>
    <div class="demo-stats" id="stack-stats"></div>
  `;

  // Program selector
  const progBtns = document.getElementById('stack-programs');
  let firstProg = true;
  for (const [name, src] of Object.entries(programs)) {
    const btn = document.createElement('button');
    btn.className = 'demo-btn' + (firstProg ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => {
      playing = false;
      vm.load_program(src);
      progBtns.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderVM();
    };
    progBtns.appendChild(btn);
    if (firstProg) { vm.load_program(src); firstProg = false; }
  }

  // Action buttons
  const actions = document.getElementById('stack-actions');
  const mkBtn = (text, cls, fn) => {
    const b = document.createElement('button');
    b.className = 'demo-btn ' + cls;
    b.textContent = text;
    b.onclick = fn;
    actions.appendChild(b);
    return b;
  };

  const playBtn = mkBtn('\u25B6 Play', 'primary', () => {
    if (vm.is_halted()) vm.reset();
    playing = !playing;
    playBtn.textContent = playing ? '\u23F8 Pause' : '\u25B6 Play';
    if (playing) animateVM();
  });

  mkBtn('Step', '', () => {
    playing = false;
    playBtn.textContent = '\u25B6 Play';
    vm.step();
    renderVM();
  });

  mkBtn('Reset', '', () => {
    playing = false;
    playBtn.textContent = '\u25B6 Play';
    vm.reset();
    renderVM();
  });

  function renderVM() {
    // Program listing with PC highlight
    const disasm = vm.disassemble();
    const pc = vm.pc();
    const lines = disasm.split('\n').filter(l => l);
    let progHTML = '';
    for (const line of lines) {
      const addr = parseInt(line.split(':')[0]);
      const isActive = addr === pc && !vm.is_halted();
      progHTML += `<div class="program-line${isActive ? ' active' : ''}">${line}</div>`;
    }
    document.getElementById('stack-program').innerHTML = progHTML;

    // Stack
    const depth = vm.stack_depth();
    let stackHTML = '';
    if (depth > 0) {
      const ptr = vm.stack_ptr();
      const stack = new Int32Array(wasm.memory.buffer, ptr, depth);
      for (let i = depth - 1; i >= 0; i--) {
        const isTop = i === depth - 1;
        stackHTML += `<span class="stack-val${isTop ? ' new' : ''}">${stack[i]}</span> `;
      }
    } else {
      stackHTML = '<span style="color:var(--text-dim);font-size:0.7rem">(empty)</span>';
    }
    document.getElementById('stack-values').innerHTML = stackHTML;

    // Output
    const outLen = vm.output_len();
    let outHTML = '';
    if (outLen > 0) {
      const outPtr = vm.output_ptr();
      const out = new Int32Array(wasm.memory.buffer, outPtr, outLen);
      outHTML = 'Output: ' + Array.from(out).join(', ');
    }
    document.getElementById('stack-output').innerHTML = outHTML;

    // Error
    const err = vm.get_error();
    document.getElementById('stack-error').textContent = err;

    // Stats
    document.getElementById('stack-stats').innerHTML =
      `PC: <span>${vm.pc()}</span> &middot; ` +
      `Steps: <span>${vm.step_count()}</span> &middot; ` +
      `Stack depth: <span>${vm.stack_depth()}</span>` +
      (vm.is_halted() ? ' &middot; <span>HALTED</span>' : '');
  }

  let stepDelay = 0;
  function animateVM() {
    if (!playing) return;
    stepDelay++;
    if (stepDelay % 8 === 0) { // Slow enough to watch
      const alive = vm.step();
      renderVM();
      if (!alive) {
        playing = false;
        playBtn.textContent = '\u25B6 Play';
        return;
      }
    }
    requestAnimationFrame(animateVM);
  }

  renderVM();
}

/* ═══════════════════════════════════════════════
   READING PROGRESS — Persist to localStorage
   ═══════════════════════════════════════════════ */
let currentBookId = 'wasm';
function saveReadingProgress(chaptersRead, totalChapters) {
  try {
    const data = JSON.parse(localStorage.getItem('epistolary_progress') || '{}');
    const existing = data[currentBookId] || { chaptersRead: 0 };
    // Only update if we've read further
    if (chaptersRead > existing.chaptersRead) {
      data[currentBookId] = {
        chaptersRead,
        totalChapters,
        lastRead: new Date().toISOString(),
      };
      localStorage.setItem('epistolary_progress', JSON.stringify(data));
    }
  } catch {}
}

/* ═══════════════════════════════════════════════
   THEME ENGINE
   ═══════════════════════════════════════════════ */
function initThemeEngine(book) {
  const { applyTheme, getTheme, setTheme, THEMES } = ELib;
  const savedTheme = getTheme();

  // Apply saved theme (but preserve book accent)
  if (savedTheme !== 'midnight') {
    applyTheme(savedTheme);
  }
  // Re-apply book accent after theme
  if (book.accent) {
    document.documentElement.style.setProperty('--gold', book.accent);
  }

  // Mark active swatch
  document.querySelectorAll('.theme-swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.theme === savedTheme);
  });

  // Swatch click handlers
  document.querySelectorAll('.theme-swatch').forEach(swatch => {
    swatch.addEventListener('click', () => {
      const name = swatch.dataset.theme;
      setTheme(name);
      // Re-apply book accent
      if (book.accent) {
        document.documentElement.style.setProperty('--gold', book.accent);
      }
      document.querySelectorAll('.theme-swatch').forEach(s =>
        s.classList.toggle('active', s.dataset.theme === name)
      );
    });
  });

  // Toggle theme panel
  document.getElementById('btn-theme').addEventListener('click', () => {
    const panel = document.getElementById('theme-panel');
    const typoPanel = document.getElementById('typo-panel');
    typoPanel.classList.remove('open');
    panel.classList.toggle('open');
  });
}

function initBookmarks() {
  const { isBookmarked, toggleBookmark } = ELib;

  // Add bookmark buttons to each chapter header
  document.querySelectorAll('.chapter').forEach(ch => {
    const id = ch.id;
    const h3 = ch.querySelector('h3');

/* ═══════════════════════════════════════════════
   HIGHLIGHTS
   ═══════════════════════════════════════════════ */
function initHighlights() {
  const toolbar = document.getElementById('highlight-toolbar');
  let savedSelection = null;

  // Show toolbar on text selection in chapters
  document.getElementById('content').addEventListener('mouseup', e => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.toString().trim().length < 3) {
      toolbar.classList.remove('show');
      return;
    }

    // Only highlight within chapter content
    const anchor = sel.anchorNode?.parentElement?.closest?.('.chapter');
    const focus = sel.focusNode?.parentElement?.closest?.('.chapter');
    if (!anchor || !focus || anchor !== focus) {
      toolbar.classList.remove('show');
      return;
    }

    savedSelection = { sel: sel.getRangeAt(0).cloneRange(), chapterId: anchor.id, text: sel.toString().trim() };

    // Position toolbar above selection
    const range = sel.getRangeAt(0);
    const rect = range.getBoundingClientRect();
    toolbar.style.left = (rect.left + rect.width / 2 - 60) + 'px';
    toolbar.style.top = (rect.top - 45 + window.scrollY) + 'px';
    toolbar.classList.add('show');
  });

  // Hide toolbar on click outside
  document.addEventListener('mousedown', e => {
    if (!toolbar.contains(e.target)) {
      toolbar.classList.remove('show');
    }
  });

  // Color button clicks
  toolbar.querySelectorAll('.hl-color-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!savedSelection) return;
      const color = btn.dataset.color;
      applyHighlight(savedSelection, color);
      toolbar.classList.remove('show');
      window.getSelection()?.removeAllRanges();
      savedSelection = null;
      refreshStudyPanel();
    });
  });

  // Restore saved highlights
  restoreHighlights();
}

function applyHighlight(selData, color) {
  const { saveHighlight } = ELib;
  const id = saveHighlight(currentBookId, {
    chapterId: selData.chapterId,
    text: selData.text,
    color: color,
  });

  // Wrap selection in highlight span
  try {
    const range = selData.sel;
    const span = document.createElement('span');
    span.className = 'text-highlight';
    span.dataset.color = color;
    span.dataset.highlightId = id;
    span.title = 'Click to remove';
    range.surroundContents(span);

    span.addEventListener('click', () => {
      ELib.removeHighlight(currentBookId, span.dataset.highlightId);
      const text = document.createTextNode(span.textContent);
      span.replaceWith(text);
      refreshStudyPanel();
    });
  } catch (e) {
    // surroundContents fails if selection spans elements — fallback
    console.warn('Highlight wrap failed (cross-element selection):', e.message);
  }
}

function restoreHighlights() {
  const highlights = ELib.getHighlights(currentBookId);
  highlights.forEach(h => {
    const chapter = document.getElementById(h.chapterId);
    if (!chapter) return;

    // Find the text within the chapter and wrap it
    const walker = document.createTreeWalker(chapter, NodeFilter.SHOW_TEXT, null, false);
    let node;
    while (node = walker.nextNode()) {
      const idx = node.textContent.indexOf(h.text);
      if (idx >= 0) {
        const range = document.createRange();
        range.setStart(node, idx);
        range.setEnd(node, idx + h.text.length);
        const span = document.createElement('span');
        span.className = 'text-highlight';
        span.dataset.color = h.color;
        span.dataset.highlightId = h.id;
        span.title = 'Click to remove';
        try {
          range.surroundContents(span);
          span.addEventListener('click', () => {
            ELib.removeHighlight(currentBookId, span.dataset.highlightId);
            const text = document.createTextNode(span.textContent);
            span.replaceWith(text);
            refreshStudyPanel();
          });
        } catch (e) { /* cross-element — skip */ }
        break; // Only first match
      }
    }
  });
}

let _currentBook = null;

function initStudyPanel(book) {
  _currentBook = book;
  refreshStudyPanel();

  document.getElementById('study-export').addEventListener('click', () => {
    const md = ELib.exportHighlightsMarkdown(currentBookId, book.title);
    const blob = new Blob([md], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${currentBookId}-study-notes.md`;
    a.click();
    URL.revokeObjectURL(url);
  });
}

function refreshStudyPanel() {
  const bookmarks = ELib.getBookmarks(currentBookId);
  const highlights = ELib.getHighlights(currentBookId);

  // Bookmarks section
  const bmContainer = document.getElementById('study-bookmarks');
  if (bookmarks.length) {
    bmContainer.innerHTML = `<div class="study-section-title">Bookmarks</div>` +
      bookmarks.map(b => `<div class="study-item" data-chapter="${b.chapterId}">&#9856; ${b.chapterId.replace(/-/g, ' ')}</div>`).join('');
    bmContainer.querySelectorAll('.study-item').forEach(item => {
      item.addEventListener('click', () => {
        const el = document.getElementById(item.dataset.chapter);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  } else {
    bmContainer.innerHTML = '';
  }

  // Highlights section
  const hlContainer = document.getElementById('study-highlights');
  if (highlights.length) {
    const colorMap = { gold: '#c9a96e', coral: '#cd5c5c', teal: '#48a6a6', lavender: '#9478c4' };
    hlContainer.innerHTML = `<div class="study-section-title">Highlights</div>` +
      highlights.map(h => `<div class="study-item" data-chapter="${h.chapterId}"><span class="study-color-dot" style="background:${colorMap[h.color] || '#c9a96e'}"></span>"${h.text.slice(0, 60)}${h.text.length > 60 ? '...' : ''}"${h.note ? `<br><small style="color:var(--text-dim)">${h.note}</small>` : ''}</div>`).join('');
    hlContainer.querySelectorAll('.study-item').forEach(item => {
      item.addEventListener('click', () => {
        const el = document.getElementById(item.dataset.chapter);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  } else {
    hlContainer.innerHTML = '';
  }
}

async function init() {
  try {
    // Read book ID from URL param
    const params = new URLSearchParams(window.location.search);
    const bookId = params.get('book') || 'wasm';
    currentBookId = bookId;

    // Fetch manifest
    const manifestRes = await fetch('books/manifest.json');
    const manifest = await manifestRes.json();
    const book = manifest.books.find(b => b.id === bookId);

    if (!book) {
      document.getElementById('loading').innerHTML =
        `<p style="color:var(--accent-crimson)">Book "${bookId}" not found. <a href="index.html" style="color:var(--gold)">Back to library</a></p>`;
      return;
    }

    // Populate hero dynamically
    document.getElementById('hero-title').textContent = book.title;
    document.getElementById('hero-subtitle').textContent = book.subtitle;
    document.getElementById('hero-manner').textContent = book.manner;
    document.title = book.title;

    // Apply book accent color
    if (book.accent) {
      document.documentElement.style.setProperty('--gold', book.accent);
    }

    // Fetch and render the treatise
    const res = await fetch(book.file);
    if (!res.ok) throw new Error('Failed to load ' + book.file);
    const md = await res.text();
    chapters = parseTreatise(md);
    renderChapters(chapters);
    buildNavigation(chapters);
    initObservers();
    initProgress();
    initDemos();
    initThemeEngine(book);
    initTypographyControls();
    initSidebarTabs();
    initBookmarks();
    initHighlights();
    initStudyPanel(book);
  } catch (err) {
    document.getElementById('loading').innerHTML =
      `<p style="color:var(--accent-crimson)">Could not load the treatise. ${err.message}. <a href="index.html" style="color:var(--gold)">Back to library</a></p>`;
  }
}
