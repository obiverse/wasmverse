<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Epistolary Library</title>
<meta name="description" content="Treatises in the manner of Euler's Letters">
<meta name="theme-color" content="#0a0a14">
<script>
// Self-healing PWA: nuke stale service workers and caches.
(function(){
  var V = 'v13';
  var KEY = 'epistolary_sw_version';
  var stored = localStorage.getItem(KEY);
  var purge = location.search.indexOf('purge') !== -1;

  if (purge || (stored && stored !== V)) {
    localStorage.setItem(KEY, V);
    localStorage.removeItem('epistolary_pwa');
    if ('caches' in window) {
      caches.keys().then(function(keys) {
        return Promise.all(keys.map(function(k) { return caches.delete(k); }));
      });
    }
    if (navigator.serviceWorker) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      }).then(function() {
        if (purge) location.replace(location.pathname);
      });
    } else if (purge) {
      location.replace(location.pathname);
    }
  } else {
    localStorage.setItem(KEY, V);
  }
})();
</script>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta property="og:title" content="The Epistolary Library">
<meta property="og:description" content="Treatises in the manner of Euler's Letters to a German Princess">
<meta property="og:type" content="article">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/reader.css">
<link rel="stylesheet" href="css/search.css">
</head>
<body>

<div id="top-progress"></div>

<section id="hero">
  <canvas id="hero-canvas"></canvas>
  <div id="hero-content">
    <h1 id="hero-title">Loading...</h1>
    <p class="subtitle" id="hero-subtitle"></p>
    <p class="manner" id="hero-manner"></p>
    <button class="enter-scroll" id="enter-btn">Begin the Initiation</button>
  </div>
  <div class="scroll-hint">scroll to enter</div>
</section>

<div id="app">
  <button id="mobile-toggle" aria-label="Toggle navigation">&#9776;</button>
  <div id="sidebar-overlay"></div>

  <nav id="sidebar">
    <div id="sidebar-header">
      <a href="index.html" class="sidebar-back-link">&larr; LIBRARY</a>
      <h2>Table of Scrolls</h2>
      <div id="reading-progress"><div id="reading-progress-bar"></div></div>
    </div>
    <div id="sidebar-controls">
      <button class="sidebar-ctrl-btn" id="btn-theme" title="Theme">&#9681;</button>
      <button class="sidebar-ctrl-btn" id="btn-typo" title="Typography">Aa</button>
    </div>
    <div id="theme-panel">
      <div class="theme-label">Reading Theme</div>
      <div class="theme-swatches">
        <div class="theme-swatch active" data-theme="midnight" title="Midnight"></div>
        <div class="theme-swatch" data-theme="parchment" title="Parchment"></div>
        <div class="theme-swatch" data-theme="sepia" title="Sepia"></div>
        <div class="theme-swatch" data-theme="dawn" title="Dawn"></div>
      </div>
    </div>
    <div id="typo-panel">
      <div class="typo-row">
        <span class="typo-label">Size</span>
        <input type="range" class="typo-slider" id="typo-size" min="14" max="24" step="1" value="19">
        <span class="typo-value" id="typo-size-val">19</span>
      </div>
      <div class="typo-row">
        <span class="typo-label">Height</span>
        <input type="range" class="typo-slider" id="typo-height" min="1.4" max="2.2" step="0.1" value="1.85">
        <span class="typo-value" id="typo-height-val">1.85</span>
      </div>
      <div class="typo-row">
        <span class="typo-label">Width</span>
        <input type="range" class="typo-slider" id="typo-width" min="55" max="90" step="1" value="72">
        <span class="typo-value" id="typo-width-val">72ch</span>
      </div>
    </div>
    <div id="sidebar-tabs">
      <button class="sidebar-tab active" data-tab="contents">Contents</button>
      <button class="sidebar-tab" data-tab="study">Study</button>
    </div>
    <div id="nav-tree"></div>
    <div id="study-panel-content">
      <div id="study-bookmarks"></div>
      <div id="study-highlights"></div>
      <button class="study-export-btn" id="study-export">Export as Markdown</button>
    </div>
  </nav>

  <div id="highlight-toolbar">
    <button class="hl-color-btn" data-color="gold" title="Gold"></button>
    <button class="hl-color-btn" data-color="coral" title="Coral"></button>
    <button class="hl-color-btn" data-color="teal" title="Teal"></button>
    <button class="hl-color-btn" data-color="lavender" title="Lavender"></button>
  </div>

  <canvas id="particles-canvas"></canvas>
  <main id="content">
    <div id="loading"><div class="spinner"></div>Unrolling the scroll...</div>
  </main>
</div>

<div id="chapter-indicator"></div>
<button id="back-to-top" aria-label="Back to top">&#8593;</button>
<div id="keyboard-hint">j / k &mdash; next / prev &nbsp;&middot;&nbsp; t &mdash; top &nbsp;&middot;&nbsp; s &mdash; sidebar</div>

<script src="js/marked.min.js"></script>
<script type="module" src="js/reader.js"></script>
<script type="module" src="js/search.js"></script>
<script src="pwa.js"></script>
</body>
</html>
