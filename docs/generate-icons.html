<!DOCTYPE html>
<html><head><title>Generate PWA Icons</title></head>
<body style="background:#111;color:#ddd;font-family:monospace;padding:2rem">
<h2>PWA Icon Generator</h2>
<p>Right-click each image and "Save Image As" to download the PNGs.</p>
<div id="output" style="display:flex;gap:2rem;flex-wrap:wrap;margin-top:1rem"></div>
<script>
const sizes = [192, 512];

function drawIcon(ctx, s) {
  const cx = s / 2, cy = s * 0.47;
  const r = s * 0.14;

  // Background
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, s * 0.7);
  bg.addColorStop(0, '#0f0f20');
  bg.addColorStop(1, '#06060e');
  ctx.fillStyle = bg;

  // Rounded rect
  const rr = s * 0.19;
  ctx.beginPath();
  ctx.moveTo(rr, 0);
  ctx.lineTo(s - rr, 0);
  ctx.quadraticCurveTo(s, 0, s, rr);
  ctx.lineTo(s, s - rr);
  ctx.quadraticCurveTo(s, s, s - rr, s);
  ctx.lineTo(rr, s);
  ctx.quadraticCurveTo(0, s, 0, s - rr);
  ctx.lineTo(0, rr);
  ctx.quadraticCurveTo(0, 0, rr, 0);
  ctx.fill();

  // Glow
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2.5);
  glow.addColorStop(0, 'rgba(201,169,110,0.12)');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, s, s);

  // Seed of Life
  ctx.strokeStyle = 'rgba(201,169,110,0.7)';
  ctx.lineWidth = s * 0.006;
  function circle(x, y, radius) {
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.stroke();
  }
  circle(cx, cy, r);
  for (let i = 0; i < 6; i++) {
    const a = (i * Math.PI / 3) - Math.PI / 2;
    circle(cx + r * Math.cos(a), cy + r * Math.sin(a), r);
  }

  // Outer ring
  ctx.strokeStyle = 'rgba(201,169,110,0.3)';
  ctx.lineWidth = s * 0.003;
  circle(cx, cy, r * 1.53);

  // Central dot
  ctx.beginPath();
  ctx.arc(cx, cy, s * 0.01, 0, Math.PI * 2);
  ctx.fillStyle = '#e4c98a';
  ctx.fill();

  // OBIVERSE text
  ctx.fillStyle = 'rgba(201,169,110,0.9)';
  ctx.font = `700 ${s * 0.07}px system-ui, -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.letterSpacing = `${s * 0.015}px`;
  ctx.fillText('OBIVERSE', cx, s * 0.82);

  // Tagline
  ctx.fillStyle = 'rgba(158,150,132,0.7)';
  ctx.font = `italic ${s * 0.031}px Georgia, serif`;
  ctx.fillText('epistolary library', cx, s * 0.89);
}

const out = document.getElementById('output');
sizes.forEach(s => {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = s;
  const ctx = canvas.getContext('2d');
  drawIcon(ctx, s);

  const div = document.createElement('div');
  div.innerHTML = `<p>${s}x${s}</p>`;

  // Convert to PNG blob and create download link
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const img = document.createElement('img');
    img.src = url;
    img.style.cssText = `width:${Math.min(s, 256)}px;height:${Math.min(s, 256)}px;border:1px solid #333;border-radius:${s*0.19}px`;
    div.appendChild(img);

    const a = document.createElement('a');
    a.href = url;
    a.download = `icon-${s}.png`;
    a.textContent = `Download icon-${s}.png`;
    a.style.cssText = 'display:block;margin-top:0.5rem;color:#c9a96e';
    div.appendChild(a);
  }, 'image/png');

  out.appendChild(div);
});
</script>
</body>
</html>
